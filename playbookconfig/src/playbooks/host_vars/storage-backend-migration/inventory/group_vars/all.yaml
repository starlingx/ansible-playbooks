#################
# Docker images #
#################

common_images:
  ceph_config_helper: registry.local:9001/docker.io/openstackhelm/ceph-config-helper:ubuntu_jammy_18.2.2-1-20240312

rook_specific_images:
  csi_attacher: registry.local:9001/registry.k8s.io/sig-storage/csi-attacher:v4.8.1
  cephcsi: registry.local:9001/quay.io/cephcsi/cephcsi:v3.15.0
  csi_provisioner: registry.local:9001/registry.k8s.io/sig-storage/csi-provisioner:v5.2.0
  csi_node_driver_registrar: registry.local:9001/registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.13.0
  csi_resizer: registry.local:9001/registry.k8s.io/sig-storage/csi-resizer:v1.13.2
  csi_snapshotter: registry.local:9001/registry.k8s.io/sig-storage/csi-snapshotter:v8.2.1
  rook_ceph:
    pacific: registry.local:9001/docker.io/rook/ceph:v1.12.11
    reef: registry.local:9001/docker.io/rook/ceph:v1.18.9
  ceph:
    pacific: registry.local:9001/quay.io/ceph/ceph:v16.2.15
    reef: registry.local:9001/quay.io/ceph/ceph:v18.2.8
  kubectl: registry.local:9001/docker.io/bitnamilegacy/kubectl:1.33.4
  stx_ceph_manager: registry.local:9001/docker.io/starlingx/stx-ceph-manager:stx.12.0-v18.2.2-0
  rsync: registry.local:9001/docker.io/starlingx/stx-debian-dev:stx.9.0-v1.0.0

lvm_specific_images:
  topolvm: registry.local:9001/ghcr.io/topolvm/topolvm-with-sidecar:0.40.1
  csi_node_driver_registrar: registry.local:9001/registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.15.0
  csi_provisioner: registry.local:9001/registry.k8s.io/sig-storage/csi-provisioner:v5.3.0
  csi_resizer: registry.local:9001/registry.k8s.io/sig-storage/csi-resizer:v2.0.0
  csi_snapshotter: registry.local:9001/registry.k8s.io/sig-storage/csi-snapshotter:v8.4.0
  livenessprobe: registry.local:9001/registry.k8s.io/sig-storage/livenessprobe:v2.17.0

# Combined images for all migration targets
images: "{{ common_images | combine(rook_specific_images) | combine(lvm_specific_images) }}"

# Target-specific image sets
images_rook_ceph: "{{ common_images | combine(rook_specific_images) }}"
images_lvm: "{{ common_images | combine(lvm_specific_images) }}"

####################
# Common variables #
####################

kubeconfig: "/etc/kubernetes/admin.conf"

pvc_batch_size: 10

storage_backend_migration_backup_dir: "/opt/platform-backup/storage-backend-migration"

# Backup safety margin is the higher between 1024 MiB and 5% of ceph data used
backups_min_safety_margin_bytes: 1073741824 # 1024 MiB
backups_max_safety_margin_percent: 5

block_openstack_app: true

allow_out_of_sync: false

#############################
# Rook-Ceph target specific #
#############################

rook_base_pacific: "/var/lib/rook"
rook_base_pod_pacific: "{{ rook_base_pacific }}/rook-ceph"
rook_base_host_pacific: "{{ rook_base_pacific }}/rook-ceph"

rook_base_reef: "/var/lib/ceph/data"
rook_base_pod_reef: "/var/lib/rook/rook-ceph"
rook_base_host_reef: "{{ rook_base_reef }}/rook-ceph"

cgts_vg_min_required_free_gib: 20
# Size in GiB for the ceph monitor filesystem on each host.
# Minimum value is 20
ceph_mon_gib: 20

osd_usage_safety_margin_percent: 25 # for SX in-service check

erase_snapshots: false # for export-import only

#######################
# LVM target specific #
#######################

lvm_spare_gib: 1 # TopoLVM spare-gb reservation
lvm_overhead_per_pv_bytes: 4194304 # 4 MiB LVM metadata overhead per PV
lvm_thin_metadata_percent: 1 # thin pool metadata reservation

lvm_mode: thick # thick or thin

lvm_thin_disk: root # root or dedicated

lvm_vg_name: lvm-provisioner

# Thin pool size when using thin/root mode (shared cgts-vg).
# Controls how much of cgts-vg free space to allocate for the thin pool.
# Accepted values: "half", "all", or a positive integer in GB.
lvm_volume_size_gb: half
