- name: "Ensure {{ tmp_workspace }} exist"
  file:
    path: "{{ tmp_workspace }}"
    state: directory

- name: Get the list of all VSCs names
  command: "kubectl get VolumeSnapshotContent -o jsonpath='{.items[*].metadata.name}'"
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: contents_list_result
  changed_when: false
  when: snapshot_contents_list is not defined

- name: "Set snapshot_contents_list fact"
  set_fact:
    snapshot_contents_list: "{{ contents_list_result.stdout }}"
    cacheable: true
  when: snapshot_contents_list is not defined

- name: "Include tasks to iterate over each Volume Snapshot content"
  include_tasks: recreate_snapshot_contents.yaml
  loop: "{{ snapshot_contents_list.split() }}"
  loop_control:
    loop_var: snapshot_contents_name
  when: snapshot_contents_list | length > 0

# Clean only if all tasks was completed, to avoid errors when reexecuting.
- name: "Cleanup {{ tmp_workspace }}"
  file:
    path: "{{ tmp_workspace }}"
    state: absent
