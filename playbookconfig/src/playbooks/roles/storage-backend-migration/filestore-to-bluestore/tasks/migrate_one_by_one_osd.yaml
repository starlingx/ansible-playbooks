- name: Get the current metadata of OSD {{ item.osd_id }}
  command: ceph osd metadata {{ item.osd_id }}
  register: current_osd_metadata
  changed_when: false

- name: Get the current ObjectStore status from OSD {{ item.osd_id }}
  set_fact:
    current_osd_type: "{{ (current_osd_metadata.stdout | from_json).osd_objectstore }}"

- name: Mark OSD as out if replica is 1
  block:
    - name: Reweight OSD {{ item.osd_id }} to zero
      command: ceph osd crush reweight osd.{{ item.osd_id }} 0
      register: reweight_zero_result

    - name: Wait for OSD {{ item.osd_id }} to drain after reweight
      block:
        - name: Wait for OSD {{ item.osd_id }} to drain after reweight
          include_tasks: wait_drain.yaml
          vars:
            osd_id: "{{ item.osd_id }}"
      rescue:
        - name: Drain after reweight did not fully complete
          debug:
            msg: "OSD {{ item.osd_id }} drain after reweight timed out. Proceeding to osd out."

    - name: Mark osd {{ item.osd_id }} as out
      command: ceph osd out {{ item.osd_id }}
      register: mark_osd_out_result

    - name: Wait for OSD {{ item.osd_id }} to drain after mark out
      include_tasks: wait_drain.yaml
      vars:
        osd_id: "{{ item.osd_id }}"

    - name: Wait for OSD {{ item.osd_id }} to be safe to destroy
      command: ceph osd safe-to-destroy {{ item.osd_id }}
      register: safe_to_destroy_check
      until: safe_to_destroy_check.rc == 0
      retries: 30
      delay: 10
      failed_when: safe_to_destroy_check.rc != 0
      changed_when: false

    - name: Wait until cluster finishes recovery after marking OSD out
      include_tasks: wait_recovery.yaml
      vars:
        wait_pg_movement: false
  when:
    - hostvars[system.active_controller]['pool_size'] | int < 2
    - current_osd_type == "filestore"

- name: Migrate one OSD
  include_tasks: migrate_single_osd.yaml # it takes an item

- name: Give Ceph some time to rellocate the active PGs when replica is bigger than 1
  pause:
    seconds: 5
  delegate_to: "{{ system.active_controller }}"
  changed_when: false
  when: hostvars[system.active_controller]['pool_size'] | int > 1

- name: Reload systemd
  systemd:
    daemon_reload: true

- name: "Start OSD {{ item.osd_id }} service"
  systemd:
    name: "ceph-osd@{{ item.osd_id }}.service"
    state: started
    enabled: true

- name: Wait until OSDs are up
  command: ceph osd tree -f json
  register: ceph_osd_tree
  retries: 120
  delay: 10
  until: >
    ceph_osd_tree.stdout | from_json | json_query("nodes[?type=='osd'].status") is not none and
    (
      ceph_osd_tree.stdout | from_json | json_query("nodes[?type=='osd'].status")
    ) | select("equalto", "up") | list | length ==
    (
      ceph_osd_tree.stdout | from_json | json_query("nodes[?type=='osd'].status") | length
    )
  changed_when: false

- name: Wait until cluster finishes recovery and health check
  include_tasks: wait_recovery.yaml

- name: Display cluster status
  debug:
    var: ceph_status.stdout_lines

- name: Get OSD tree after migrating OSD
  command: timeout 30 ceph osd tree
  register: ceph_osd_tree_output
  changed_when: false

- name: Display OSD tree
  debug:
    var: ceph_osd_tree_output.stdout_lines
