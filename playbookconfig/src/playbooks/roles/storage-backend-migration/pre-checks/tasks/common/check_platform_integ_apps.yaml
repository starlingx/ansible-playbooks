- name: Check if platform-integ-apps is applied
  include_tasks: "{{ role_path_common }}/tasks/check_app_status.yaml"
  vars:
    app_name_to_check: "platform-integ-apps"
    failed_when: false

- name: Fail if platform-integ-apps not applied
  fail:
    msg: |
      platform-integ-apps must be applied to proceed.
  when: >
    app_status_check is not defined or
    app_status_check.rc != 0 or
    (app_status_check.stdout | default('') | trim) != 'applied'
