- name: Ensure lvm_mode is defined and valid
  assert:
    that:
      - lvm_mode is defined
      - lvm_mode in valid_lvm_modes
    fail_msg: >-
      Invalid or missing lvm_mode.
      Must be one of: {{ valid_lvm_modes | join(', ') }}.
      Current value: {{ lvm_mode | default('undefined') }}
    success_msg: "LVM mode validated: {{ lvm_mode }}"

- name: Check if an LVM storage-backend already exists
  become: true
  become_user: postgres
  command: >
    psql -d sysinv -t -A -c
    "SELECT name FROM storage_backend WHERE backend = 'lvm';"
  register: lvm_backend_check
  changed_when: false

- name: Fail if LVM storage-backend already exists
  fail:
    msg: >-
      An LVM storage-backend already exists ('{{ lvm_backend_check.stdout | trim }}')
      and conflicts with the LVM migration.
  when: lvm_backend_check.stdout_lines | length > 0

- name: "Check LVM {{ lvm_mode }} common cases"
  include_tasks: "{{ lvm_mode }}/main.yaml"
