- name: Populate host in-sync list
  include_tasks: "{{ role_path_common }}/tasks/get_hosts_in_sync.yaml"

- name: Check if all hosts are in-sync and reconciled
  fail:
    msg: |-
      Some hosts are NOT in-sync or reconciled:
      {{
        bad_hosts_in_sync
        | map(attribute='metadata.name')
        | unique
        | list
      }}
      In case the in-sync or reconciled false state is not important,
      this pre-check can be skipped by using the flag '-e allow_out_of_sync=true'.
      The final system state check will also allow the hosts to not be insync or reconciled.
  when:
    - bad_hosts_in_sync | length > 0
    - not allow_out_of_sync | bool

- name: All hosts are in-sync and reconciled
  debug:
    msg: "All hosts are in-sync=true and reconciled=true"
  when: bad_hosts_in_sync | length == 0
