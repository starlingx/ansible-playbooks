- name: Get /var disk usage percentage
  shell: |
    df -h /var | awk 'NR==2 {print $5}'
  register: var_usage_percentage
  changed_when: false

- name: Set fact for /var usage as an integer
  set_fact:
    var_used_int: "{{ var_usage_percentage.stdout | replace('%', '') | int }}"

- name: Define maximum allowed usage (30% available == 70% used)
  set_fact:
    max_allowed_usage: 70

- name: Fail if /var usage is 70% or more (less than 30% available)
  fail:
    msg: |
      The /var directory is at {{ var_used_int }}% usage, which is equal to or higher than the {{ max_allowed_usage }}% limit (less than 30% available).
      Please free up space in /var to proceed with the migration.
  when: var_used_int | int >= max_allowed_usage

- name: Debug confirmation when /var has sufficient space
  debug:
    msg: |
      The /var directory is at {{ var_used_int }}% usage, which is below the {{ max_allowed_usage }}% limit.
      Sufficient space is available.
  when: var_used_int | int < max_allowed_usage
