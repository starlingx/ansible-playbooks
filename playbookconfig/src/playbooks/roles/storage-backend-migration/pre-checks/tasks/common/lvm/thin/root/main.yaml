- name: Validate inventory_hostname format
  assert:
    that:
      - inventory_hostname is defined
      - inventory_hostname is regex('^[a-zA-Z0-9._-]+$')
    fail_msg: >-
      Invalid inventory_hostname '{{ inventory_hostname | default('undefined') }}'.
      Must match ^[a-zA-Z0-9._-]+$.
    success_msg: "inventory_hostname validated: {{ inventory_hostname }}"

- name: Check if cgts-vg already has lvm_function configured
  become: true
  become_user: postgres
  command: >
    psql -d sysinv -t -A -c
    "SELECT i_lvg.capabilities::json->>'lvm_function' FROM i_lvg
     JOIN i_host ON i_lvg.forihostid = i_host.id
     WHERE lvm_vg_name = 'cgts-vg'
     AND i_host.hostname = '{{ inventory_hostname }}';"
  register: cgtsvg_lvm_function_check
  changed_when: false

- name: Fail if cgts-vg already has lvm_function configured
  fail:
    msg: >-
      Volume Group 'cgts-vg' on host '{{ inventory_hostname }}' already has
      lvm_function '{{ cgtsvg_lvm_function_check.stdout | trim }}' configured
      and conflicts with the LVM migration.
  when:
    - cgtsvg_lvm_function_check.stdout | trim | length > 0
    - cgtsvg_lvm_function_check.stdout | trim != 'none'

- name: Validate lvm_volume_size_gb
  assert:
    that:
      - lvm_volume_size_gb_normalized is defined
      - lvm_volume_size_gb_normalized is match("^[0-9]+$")
      - lvm_volume_size_gb_normalized | int > 0
      - lvm_volume_size_gb_normalized | int <= lvm_volume_size_gb_max | int
    fail_msg: >
      Invalid value for lvm_volume_size_gb: {{ lvm_volume_size_gb }}.
      Must be "half", "all" or an integer between 1 and {{ lvm_volume_size_gb_max }}.
    success_msg: >
      Valid lvm_volume_size_gb: {{ lvm_volume_size_gb }}
      lvm_volume_size_gb_normalized: {{ lvm_volume_size_gb_normalized }}
