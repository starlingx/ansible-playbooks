- name: Get active MDS daemon name
  shell: ceph mds stat | grep -oP '(?<==)\S+(?==up:active)'
  register: active_mds_daemons
  changed_when: false

- name: Flush MDS journal
  command: ceph daemon mds.{{ item }} flush journal
  loop: "{{ active_mds_daemons.stdout_lines }}"
  register: flush_result
  delegate_to: "{{ item }}"
  when: active_mds_daemons.stdout_lines | length > 0
