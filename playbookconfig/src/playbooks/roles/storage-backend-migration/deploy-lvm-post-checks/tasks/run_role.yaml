- name: Wait for lvm-csi to reach applied
  include_tasks: "{{ role_path_common }}/tasks/check_app_status.yaml"
  vars:
    app_name_to_check: lvm-csi
    success_statuses:
      - applied
    failure_statuses:
      - apply-failed
    retries: 366 # 1 hour and 1 minute, good luck
    delay: 10

- name: Delete old cluster alarms
  include_tasks: "{{ role_path_common }}/tasks/delete_old_cluster_alarms.yaml"
