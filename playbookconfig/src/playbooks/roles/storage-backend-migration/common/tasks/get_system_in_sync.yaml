- name: Get system status from Kubernetes
  command: kubectl get system -n deployment
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: kubectl_system_output
  changed_when: false
  failed_when: false

- name: Fail if no system is found in Deployment Manager
  fail:
    msg: No system configuration found in Deployment Manager.
  when:
    - kubectl_system_output.stderr | length > 0
    - kubectl_system_output.stdout | length == 0

- name: Display system status
  debug:
    var: kubectl_system_output.stdout_lines

- name: Get system from in JSON format
  command: kubectl get system -n deployment -o json
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: system_json
  changed_when: false

- name: Parse system JSON
  set_fact:
    system_list: "{{ system_json.stdout | from_json }}"

- name: Set bad system list
  set_fact:
    bad_system_in_sync: >-
        {{
          system_list['items']
          | selectattr('status.inSync', '!=', true)
          | list
          +
          system_list['items']
          | selectattr('status.reconciled', '!=', true)
          | list
        }}
