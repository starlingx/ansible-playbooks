- name: Get hosts status from Kubernetes
  command: kubectl get hosts -n deployment
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: kubectl_hosts_output
  changed_when: false
  failed_when: false

- name: Fail if no hosts are found in Deployment Manager
  fail:
    msg: No host configuration found in Deployment Manager.
  when:
    - kubectl_hosts_output.stderr | length > 0
    - kubectl_hosts_output.stdout | length == 0

- name: Display host status
  debug:
    var: kubectl_hosts_output.stdout_lines

- name: Get hosts from in JSON format
  command: kubectl get hosts -n deployment -o json
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: hosts_json
  changed_when: false

- name: Parse hosts JSON
  set_fact:
    hosts_list: "{{ hosts_json.stdout | from_json }}"

- name: Set bad host list
  set_fact:
    bad_hosts_in_sync: >-
        {{
          hosts_list['items']
          | selectattr('status.inSync', '!=', true)
          | list
          +
          hosts_list['items']
          | selectattr('status.reconciled', '!=', true)
          | list
        }}
