- name: >
    Disable swacts with heartbeat_failure_action=none,
    k8s_application_audit
    and autoreapply_apps_after_apply_runtime_manifest
  environment: "{{ system_env }}"
  shell: |
    system service-parameter-modify platform maintenance heartbeat_failure_action=none
    system service-parameter-modify platform config k8s_application_audit=disabled
    system service-parameter-modify platform config autoreapply_apps_after_apply_runtime_manifest=disabled
    system service-parameter-apply platform
  when: inventory_hostname in groups.active_controller

- name: Disable hostw.service
  systemd:
    name: "hostw.service"
    state: stopped
