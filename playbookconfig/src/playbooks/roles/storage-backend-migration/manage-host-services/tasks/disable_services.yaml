- name: Retrieve current autoreapply_apps_after_apply_runtime_manifest_before
  block:
    - name: Query DB
      become: true
      become_user: postgres
      command: >
        psql -d sysinv -t -A -c "
        SELECT value FROM service_parameter
        WHERE service = 'platform'
        AND section = 'config'
