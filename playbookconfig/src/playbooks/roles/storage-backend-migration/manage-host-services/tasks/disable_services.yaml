- name: Retrieve current heartbeat_failure_action
  block:
    - name: Query DB
      become: true
      become_user: postgres
      command: >
        psql -d sysinv -t -A -c "
        SELECT value FROM service_parameter
        WHERE service = 'platform'
        AND section = 'maintenance'
        AND name = 'heartbeat_failure_action';"
      register: heartbeat_failure_action_current
      changed_when: false

    - name: Save current heartbeat_failure_action
      set_fact:
        heartbeat_failure_action_before: "{{ heartbeat_failure_action_current.stdout | trim }}"
        cacheable: true
  when:
    - inventory_hostname in groups.active_controller
    - heartbeat_failure_action_before is undefined

- name: Debug heartbeat_failure_action_before
  debug:
    var: heartbeat_failure_action_before
  when: inventory_hostname in groups.active_controller

