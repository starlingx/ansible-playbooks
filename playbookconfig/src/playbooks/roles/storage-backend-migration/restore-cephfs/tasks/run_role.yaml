- name: "Ensure {{ tmp_workspace }} exist"
  file:
    path: "{{ tmp_workspace }}"
    state: directory

- name: Start Ceph Services
  include_tasks: start_ceph_services.yaml

- name: Bounce rook-ceph pods
  block:
    - name: Scale desired deployments to replica 0
      include_tasks: "{{ role_path_common }}/tasks/kubernetes/scale_resources.yaml"
      vars:
        resources:
          - method: "name"
            name: "rook-ceph-operator"
            namespace: "rook-ceph"
            kind: Deployment
            replicas: 0
          - method: "label"
            label: "app=rook-ceph-mds"
            namespace: "rook-ceph"
            kind: Deployment
            replicas: 0
          - method: "label"
            label: "app=rook-ceph-mgr"
            namespace: "rook-ceph"
            kind: Deployment
            replicas: 0
          - method: "label"
            label: "app=rook-ceph-osd"
            namespace: "rook-ceph"
            kind: Deployment
            replicas: 0
          - method: "label"
            label: "app=rook-ceph-mon"
            namespace: "rook-ceph"
            kind: Deployment
            replicas: 0

    - name: Scale up all mons
      include_tasks: "{{ role_path_common }}/tasks/kubernetes/scale_resources.yaml"
      vars:
        resources:
          - method: "label"
            label: "app=rook-ceph-mon"
            namespace: "rook-ceph"
            kind: Deployment
            replicas: 1

    - name: Verify that all rook-ceph mon pods are Running
      shell: |
        kubectl get pods -n rook-ceph \
          -o jsonpath='{range .items[*]}{.metadata.name}{" "}{.status.phase}{"\n"}{end}' \
        | grep -E '^rook-ceph-mon-[a-z]+' \
        | awk '{if ($2 != "Running") {print $0; exit 1}}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: ceph_pods_check
      retries: 60
      delay: 10
      until: ceph_pods_check.rc == 0

    - name: Wait until all MONs to be in quorum
      shell: timeout 30 ceph mon stat
      register: ceph_mon_stat
      retries: 60
      delay: 10
      until: ceph_mon_stat.rc == 0 and "out of quorum" not in ceph_mon_stat.stdout

    - name: Ceph MON stat result
      debug:
        var: ceph_mon_stat.stdout_lines

    - name: Start Ceph Services
      include_tasks: start_ceph_services.yaml

  when:
    - bounce_rook_pods is defined
    - bounce_rook_pods | bool

- name: Restore CephFS
  include_tasks: restore_cephfs.yaml

- name: Disable auto-scale for all pools
  include_tasks: "{{ role_path_common }}/tasks/ceph/toggle_auto_scale_pgs.yaml"
  vars:
    action: "off"

- name: Disable warn about recently crashs
  shell: |
    ceph config set mgr mgr/crash/warn_recent_interval 0

- name: Change require-osd-release value
  shell: |
    ceph osd require-osd-release {{ require_osd_release }}

- name: Wait for Ceph HEALTH_OK
  include_tasks: "{{ role_path_common }}/tasks/ceph/check_ceph_health.yaml"
  vars:
    ceph_desired_status:
      - "HEALTH_OK"

- name: Cleanup temporary rook-ceph folder
  file:
    path: "{{ tmp_workspace }}"
    state: absent
