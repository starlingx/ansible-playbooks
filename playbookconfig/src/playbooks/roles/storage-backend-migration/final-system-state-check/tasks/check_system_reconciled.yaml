- name: Get system status from Kubernetes
  shell: kubectl get system -n deployment
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: kubectl_system_output
  changed_when: false

- name: Display system status
  debug:
    var: kubectl_system_output.stdout_lines

- name: Get system from in JSON format
  shell: kubectl get system -n deployment -o json
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: system_json
  changed_when: false

- name: Parse system JSON
  set_fact:
    system_list: "{{ system_json.stdout | from_json }}"

- name: Set bad system list
  set_fact:
    bad_system_reconciled: >-
        {{
          system_list['items']
          | selectattr('status.reconciled', '!=', true)
          | list
        }}

- name: Check if system is reconciled
  debug:
    msg: >
      System is NOT reconciled:
      {{
        bad_system_reconciled
        | map(attribute='metadata.name')
        | unique
        | list
      }}
  when: bad_system_reconciled | length > 0

- name: System reconciled
  debug:
    msg: "System reconciled"
  when: bad_system_reconciled | length == 0
