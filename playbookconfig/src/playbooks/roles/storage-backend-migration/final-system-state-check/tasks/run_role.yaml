- name: "Ensure {{ tmp_workspace }} exist"
  file:
    path: "{{ tmp_workspace }}"
    state: directory

- name: Check if hosts are reconciled
  include_tasks: "check_hosts_reconciled.yaml"

- name: Check if system is reconciled
  include_tasks: "check_system_reconciled.yaml"

- name: Raise not reconciled migration alarm if hosts are not reconciled
  script: "{{ role_path_common }}/files/fm_alarm.py --entity-uuid {{ storage_backend.uuid }} --set not_reconciled --file-name {{ final_dm_file_path }}"
  vars:
    storage_backend: "{{ hostvars[system.active_controller].storage_backend }}"
    final_dm_file_path:  "{{ hostvars[system.active_controller].final_dm_full_file_path }}"
  when: bad_hosts_reconciled | length > 0 or bad_system_reconciled | length > 0

- name: Clear not reconciled migration alarm if hosts and system are reconciled
  script: "{{ role_path_common }}/files/fm_alarm.py --entity-uuid {{ storage_backend.uuid }} --clear not_reconciled --file-name {{ final_dm_file_path }}"
  vars:
    storage_backend: "{{ hostvars[system.active_controller].storage_backend }}"
    final_dm_file_path:  "{{ hostvars[system.active_controller].final_dm_full_file_path }}"
  when:
    - bad_system_reconciled | length == 0
    - bad_hosts_reconciled| length == 0

- name: Display system alarms after migration
  include_tasks: "{{ roles_dir_path }}/pre-checks/tasks/common/display_alarms.yaml"

- name: Check Ceph cluster status
  command: timeout 30 ceph -s
  register: ceph_status
  changed_when: false
  when: migration_target == "rook_ceph"

- name: Final Ceph Cluster status
  debug:
    var: ceph_status.stdout_lines
  when: migration_target == "rook_ceph"

- name: Cleanup temporary workspace folder
  file:
    path: "{{ tmp_workspace }}"
    state: absent
