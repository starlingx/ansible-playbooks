- name: Export RBD pool images
  shell: |
    set -o pipefail

    echo "Checking pool: ${ORIGINAL_POOL}"

    IMAGES=$(rbd ls -p "${ORIGINAL_POOL}" 2>/dev/null) || continue

    if [ -z "$IMAGES" ]; then
      echo "Skipping: No RBD images found in pool ${ORIGINAL_POOL}"
      continue
    fi

    POOL_BKP_DIR="${RBD_BACKUP_DIR}/${ORIGINAL_POOL}"

    mkdir -p "$POOL_BKP_DIR"

    for obj_name in $IMAGES; do
      BKP_FILE_HOST="${POOL_BKP_DIR}/${obj_name}.bkp.gz"

      rbd export --export-format 2 "${ORIGINAL_POOL}/${obj_name}" - \
        | pigz > "${BKP_FILE_HOST}"

      if [[ $? -ne 0 ]]; then
          echo "Retrying: trying export format 1 for ${ORIGINAL_POOL}/${obj_name}"
          rm -f "${BKP_FILE_HOST}"
          rbd export --export-format 1 "${ORIGINAL_POOL}/${obj_name}" - \
          | pigz > "${BKP_FILE_HOST}" || { echo "ERROR: export/pigz failed, possibly out of space"; exit 1; }
      fi

      echo "Verifying: ${ORIGINAL_POOL}/${obj_name} image backup integrity..."
      gzip -t "${BKP_FILE_HOST}" || { echo "ERROR: gzip integrity check failed for ${BKP_FILE_HOST}"; exit 1; }

      echo "Image ${ORIGINAL_POOL}/${obj_name} exported to ${BKP_FILE_HOST}"
    done
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
    RBD_BACKUP_DIR: "{{ backups_rbd_path }}"
    ORIGINAL_POOL: "{{ original_pool }}"
    NEW_POOL: "{{ new_pool }}"

- name: Create new RBD pool if needed
  shell: |
    if ! ceph osd pool ls | grep -q "^${NEW_POOL}$"; then
      echo "Creating new pool: ${NEW_POOL}"
      ceph osd pool create "${NEW_POOL}" 64 64
      rbd pool init "${NEW_POOL}"
      ceph osd pool set "${NEW_POOL}" size "${NEW_POOL_SIZE}"
      ceph osd pool set "${NEW_POOL}" min_size "${NEW_POOL_MIN}"
      ceph osd pool get "${NEW_POOL}" all
    else
      echo "Pool ${NEW_POOL} already exists"
    fi
  register: new_pool_create
  environment:
    NEW_POOL: "{{ new_pool }}"
    NEW_POOL_SIZE: "{{ pool_size }}"
    NEW_POOL_MIN: "{{ pool_minsize }}"

- name: Debug new pool creation
  debug:
    var: new_pool_create.stdout_lines

- name: Delete RBD pool
  shell: |
    echo "Deleting pool: ${ORIGINAL_POOL}"
    mon_allow_pool_delete=$(ceph config get mon.0 mon_allow_pool_delete)
    ceph config set mon mon_allow_pool_delete true
    ceph osd pool delete "${ORIGINAL_POOL}" "${ORIGINAL_POOL}" --yes-i-really-really-mean-it
    ceph config set mon mon_allow_pool_delete "${mon_allow_pool_delete}"
  environment:
    ORIGINAL_POOL: "{{ original_pool }}"

- name: Import RBD pool images
  shell: |
    set -o pipefail

    POOL_BKP_DIR="${RBD_BACKUP_DIR}/${ORIGINAL_POOL}"

    for backup_file in "${POOL_BKP_DIR}"/*.bkp.gz; do
      [ -e "$backup_file" ] || continue

      obj_name=$(basename "$backup_file" .bkp.gz)

      if rbd info "${ORIGINAL_POOL}/${obj_name}" >/dev/null 2>&1; then
        echo "Skipping ${ORIGINAL_POOL}/${obj_name}: image already exists"
        continue
      fi

      gunzip -c "$backup_file" | rbd import --export-format 2 - "${NEW_POOL}/${obj_name}"

      if [[ $? -ne 0 ]]; then
        echo "Retrying: trying import format 1 for ${NEW_POOL}/${obj_name}"
        rbd rm "${NEW_POOL}/${obj_name}" 2>/dev/null || true
        gunzip -c "$backup_file" | rbd import --export-format 1 - "${NEW_POOL}/${obj_name}" \
        || { echo "ERROR: import/gunzip failed"; exit 1; }
      fi

      echo "Image ${ORIGINAL_POOL}/${obj_name} imported to ${NEW_POOL}"
    done

    echo "SUCCESS: RBD images imported to ${NEW_POOL}."
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
    RBD_BACKUP_DIR: "{{ backups_rbd_path }}"
    ORIGINAL_POOL: "{{ original_pool }}"
    NEW_POOL: "{{ new_pool }}"

- name: Remove temporary backups
  file:
    path: "{{ backups_rbd_path }}/{{ original_pool }}"
    state: absent

- name: Get kube-rbd pool details from live system
  command: timeout 30 ceph osd pool ls detail --format json
  register: kube_rbd_pool_raw
  changed_when: false
  when: all_pools_list | selectattr('name', 'equalto', 'kube-rbd') | list | length == 0

- name: Extract kube-rbd pool configuration
  set_fact:
    kube_rbd_pool_config: "{{ kube_rbd_pool_raw.stdout | from_json | selectattr('pool_name', 'equalto', 'kube-rbd') | first }}"
  when: all_pools_list | selectattr('name', 'equalto', 'kube-rbd') | list | length == 0

- name: Remove kube-rbdkube-system from all_pools_list and add kube-rbd if not present
  set_fact:
    all_pools_list: |
      {{ (all_pools_list | rejectattr('name', 'equalto', 'kube-rbdkube-system') | list) + 
         ([] if (all_pools_list | selectattr('name', 'equalto', 'kube-rbd') | list | length > 0) else [{
           'name': kube_rbd_pool_config.pool_name,
           'id': kube_rbd_pool_config.pool_id,
           'pg_num': kube_rbd_pool_config.pg_num,
           'pgp_num': kube_rbd_pool_config.pg_placement_num,
           'crush_rule': kube_rbd_pool_config.crush_rule,
           'crush_rule_name': 'replicated_rule',
           'size': kube_rbd_pool_config.size,
           'min_size': kube_rbd_pool_config.min_size,
           'application': kube_rbd_pool_config.application_metadata | list | first | default('')
         }]) }}
    cacheable: true

- name: Debug new all_pools_list without old rbd pool
  debug:
    var: all_pools_list

