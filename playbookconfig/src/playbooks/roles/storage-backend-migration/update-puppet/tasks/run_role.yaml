- name: Update puppet system config
  shell: sysinv-puppet create-system-config
  register: puppet_update_result
  ignore_errors: true

- name: Debug Puppet system
  debug:
    var: puppet_update_result.stdout_lines

- name: Update puppet host config
  shell: sysinv-puppet create-host-config
  register: puppet_host_result

- name: Debug Puppet host
  debug:
    var: puppet_host_result.stdout_lines
