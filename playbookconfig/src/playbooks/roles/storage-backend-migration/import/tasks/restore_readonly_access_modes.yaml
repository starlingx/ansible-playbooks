- name: Display PVCs that will be restored to ReadOnlyMany
  debug:
    msg: "Restoring {{ readonly_pvcs | length }} PVC(s) to ReadOnlyMany: {{ readonly_pvcs | map(attribute='name') | list }}"
  when: readonly_pvcs | length > 0

- name: Recreate PVCs with original ReadOnlyMany access mode
  include_tasks: restore_readonly_single_pvc.yaml
  loop: "{{ readonly_pvcs }}"
  loop_control:
    loop_var: readonly_pvc
    label: "{{ readonly_pvc.name }}"
  when: readonly_pvcs | length > 0
