- name: "Ensure {{ tmp_workspace }} exist"
  file:
    path: "{{ tmp_workspace }}"
    state: directory

- name: Import ceph data
  block:
    - name: Import CephFS data backup
      include_tasks: import_cephfs_backup.yaml
      loop: "{{ hostvars[system.active_controller]['cephfs_pvcs_by_namespace'] | default({}) | dict2items }}"
      vars:
        cephfs_pvc_namespace: "{{ item.key }}"
        cephfs_pvc_list: "{{ item.value }}"
      when:
        - hostvars[system.active_controller]['cephfs_pvcs_by_namespace'] is defined
        - hostvars[system.active_controller]['cephfs_pvcs_by_namespace'] | length > 0

    - name: Import RBD data backup
      include_tasks: import_rbd_backup.yaml
      when: hostvars[system.active_controller]['rbd_pvcs_names'] | length > 0

    - name: Rename RBD images name
      include_tasks: "{{ role_path_common }}/tasks/rename_rbd_image.yaml"

  always:
    - name: "Cleanup {{ tmp_workspace }}"
      file:
        path: "{{ tmp_workspace }}"
        state: absent
