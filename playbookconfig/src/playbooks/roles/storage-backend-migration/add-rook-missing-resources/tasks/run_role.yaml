- name: "Ensure {{ tmp_workspace }} exist"
  file:
    path: "{{ tmp_workspace }}"
    state: directory

- name: Copy files to workspace
  copy:
    src: "{{ roles_dir_path }}/{{ role_name }}/files/{{ item }}"
    dest: "{{ tmp_workspace }}/{{ item }}"
    mode: "0755"
  loop: "{{ yaml_files }}"

- name: Create ceph-wipe-disks service account if does not exists
  include_tasks: create_wipe_disks_service_account.yaml

- name: Cleanup temporary workspace folder
  file:
    path: "{{ tmp_workspace }}"
    state: absent
