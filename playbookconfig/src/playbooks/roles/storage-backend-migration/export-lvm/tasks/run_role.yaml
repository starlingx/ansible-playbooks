- name: "Ensure {{ tmp_workspace }} exist"
  file:
    path: "{{ tmp_workspace }}"
    state: directory

- name: Export Filesystem and Block backups
  block:

    - name: Create backup folders
      include_tasks: create_backups_folders.yaml

    - name: Create Filesystem data backup
      include_tasks: create_ceph_backup.yaml
      loop: "{{ hostvars[system.active_controller]['filesystem_pvcs_by_namespace'] | default({}) | dict2items }}"
      vars:
        generic_pvc_namespace: "{{ item.key }}"
        generic_pvc_list: "{{ item.value }}"
        generic_backups_path: "{{ backups_filesystem_path }}"
      when:
        - hostvars[system.active_controller]['filesystem_pvcs_by_namespace'] is defined
        - hostvars[system.active_controller]['filesystem_pvcs_by_namespace'] | length > 0

    - name: Create Block data backup
      include_tasks: create_block_backup.yaml
      loop: "{{ hostvars[system.active_controller]['block_pvcs_by_namespace'] | default({}) | dict2items }}"
      vars:
        generic_pvc_namespace: "{{ item.key }}"
        generic_pvc_list: "{{ item.value }}"
        generic_backups_path: "{{ backups_block_path }}"
      when:
        - hostvars[system.active_controller]['block_pvcs_by_namespace'] is defined
        - hostvars[system.active_controller]['block_pvcs_by_namespace'] | length > 0

  rescue:
    - name: Cleanup copied backups
      command: rm -rf {{ backups_path }}/*
      environment: "{{ system_env }}"
      ignore_errors: true

    - name: Capture failure details
      set_fact:
        failure_msg: >
          Task export failed.
          Error: {{ ansible_failed_result.msg | default('No error message captured.') }}

    - name: Force playbook failure
      fail:
        msg: "{{ failure_msg }}"

  always:
    - name: "Cleanup {{ tmp_workspace }}"
      file:
        path: "{{ tmp_workspace }}"
        state: absent
