- name: "Batch block export for namespace {{ generic_pvc_namespace }}"
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  vars:
    batch_pod_name: "migration-export-block-batch"
  block:
    - name: Create block batch pod with {{ batch_pvcs | length }} PVCs
      template:
        src: "{{ role_path_common }}/templates/pod-migration-block-batch.yaml.j2"
        dest: "{{ tmp_workspace }}/pod-migration-export-block-batch.yaml"
        mode: "0644"
      vars:
        pod_name: "{{ batch_pod_name }}"
        pod_namespace: "{{ generic_pvc_namespace }}"
        batch_pvc_list: "{{ batch_pvcs }}"
        backup_path: "{{ generic_backups_path }}"

    - name: Delete block batch pod if exists
      command: "kubectl delete pod {{ batch_pod_name }} -n {{ generic_pvc_namespace }} --ignore-not-found=true"

    - name: Apply block batch pod
      command: "kubectl apply -f {{ tmp_workspace }}/pod-migration-export-block-batch.yaml"

    - name: Wait for block batch pod to be running
      command: >
        kubectl get pod {{ batch_pod_name }} -n {{ generic_pvc_namespace }}
        -o jsonpath='{.status.phase}'
      register: batch_pod_status
      until: "'Running' in batch_pod_status.stdout"
      retries: 60
      delay: 10
      changed_when: false

    - name: Export each block PVC in batch
      include_tasks: create_block_backup_single_pvc.yaml
      loop: "{{ batch_pvcs }}"
      loop_control:
        loop_var: pvc
        index_var: pvc_index

    - name: Cleanup block batch pod
      command: "kubectl delete -f {{ tmp_workspace }}/pod-migration-export-block-batch.yaml --ignore-not-found=true"
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
