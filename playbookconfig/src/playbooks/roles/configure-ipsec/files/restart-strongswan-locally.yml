#
# SUB-TASK DESCRIPTION:
#   This task execute charon daemon restart. It ensures to flush
#   policies and state from xframe and perform charon full start
#   and stop actions.
#

- block:
  - name: Stop charon with pmon request
    command: pmon-stop {{ strongswan_process }}

  - name: Disable strongswan service
    systemd:
      name: "{{ strongswan_service }}"
      enabled: no
      state: stopped

  - name: Flush policies
    command: ip xfrm policy flush

  - name: Flush state
    command: ip xfrm state flush

  - name: Enable strongswan service
    systemd:
      name: "{{ strongswan_service }}"
      enabled: yes
      state: started
