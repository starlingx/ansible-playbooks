- name: Stat sysctl file configuration
  stat:
    path: /etc/sysctl.d/98-sysctl.conf

- name: Enable net.ipv4.ip_forward in sysctl
  sysctl:
    name: net.ipv4.ip_forward
    value: 1
    sysctl_file: /etc/sysctl.d/98-sysctl.conf
    state: present
