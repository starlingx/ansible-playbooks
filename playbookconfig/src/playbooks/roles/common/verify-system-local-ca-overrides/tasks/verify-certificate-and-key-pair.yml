#
# Tasks to identify certificate and key pair types, validate that the key meets the
# required strength, and verify that the certificate and key match.
#
- name: Get the certificate key type
  community.crypto.x509_certificate_info:
    path: "{{ local_ca_file.path }}"
  register: cert_info

- name: Get the private key type
  community.crypto.openssl_privatekey_info:
    path: "{{ local_ca_key_file.path }}"
  register: key_info

- name: Fail if the provided system-local-ca key is not RSA (Bullseye)
  fail:
    msg: >-
      The provided system-local-ca cert/key type is {{ key_info.type }}, which is not supported.
      Please replace it with an RSA-based cert/key.
  when: is_bullseye and key_info.type != "RSA"

- name: Fail if the provided system-local-ca key type is not supported
  fail:
    msg: >-
      The provided system-local-ca cert/key type is {{ key_info.type }}, which is not supported.
      Please replace it with an RSA-based or ECC-based cert/key.
  when: key_info.type not in ["RSA", "ECC"]

- name: Validate RSA key strength
  assert:
    that:
      - key_info.public_data.size >= 4096
    fail_msg: >-
      The provided {{ key_info.public_data.size }}-bit RSA key is not supported.
      Please provide an RSA key of at least 4096 bits.
    success_msg: "The {{ key_info.public_data.size }}-bit RSA key meets the required strength."
  when: key_info.type == "RSA"

- name: Validate ECC key curve
  assert:
    that:
      - key_info.public_data.curve in ["secp384r1", "secp521r1"]
    fail_msg: >-
      The provided ECC curve '{{ key_info.public_data.curve }}' is not supported.
      Please provide a key with the secp384r1 (P-384) or stronger curve.
    success_msg: "The ECC key curve '{{ key_info.public_data.curve }}' is valid."
  when: key_info.type == "ECC"

- name: Verify that the certificate matches the key
  assert:
    that:
      - cert_info.public_key == key_info.public_key
    fail_msg: "The certificate does not match the key."
    success_msg: "The certificate matches the key."
