# SUB-TASKS DESCRIPTION:
#   Restore sysinv and flock services.  The sysinv data is stored
#   in postgres, so that is restored first.  After flock services
#   are restarted to pick up changes.

- name: >
    Stop flock, postgres and SM services, initialize
    postgres db and restart postgres service during
    factory restore
  block:
    # Capture factory boot/rootfs device before DB is overwritten.
    # These values are not re-discovered by sysinv-agent on unlock.
    - name: Capture factory boot and rootfs device
      shell: >-
        psql -t -A -F',' -c
        "SELECT boot_device, rootfs_device FROM i_host
        WHERE hostname='controller-0';" sysinv
      register: factory_host_devices
      become_user: postgres

    - name: Get postgres bin directory
      command: pg_config --bindir
      register: pg_bindir

    # Use sm-stop to gracefully stop services while SM
    # is still running.
    - name: Stop services via SM
      command: "sm-stop service {{ item }}"
      loop:
        - mtc-agent
        - haproxy
        - "{{ 'barbican-api' if os_release == 'debian' else 'openstack-barbican-api' }}"
        - "{{ 'keystone' if os_release == 'debian' else 'openstack-keystone' }}"
        - sysinv-conductor
        - rabbit

    - name: Stop pmon-managed flock services
      command: "pmon-stop {{ item }}"
      loop:
        - fm-api
        - sysinv-agent
        - mtcClient

    - name: Stop postgres via SM
      command: sm-stop service postgres

    - name: Stop SM service
      command: pmon-stop sm

    # pg_dumpall backup includes credentials,
    # so initdb + psql -f restores everything cleanly.
    - name: Remove existing postgres data
      file:
        path: "{{ pg_datadir }}"
        state: absent

    - name: Recreate postgres data directory
      file:
        path: "{{ pg_datadir }}"
        state: directory
        owner: postgres
        group: postgres
        mode: '0700'

    # Restore SM runtime db from etc
    - name: Restore SM runtime DB for factory restore
      copy:
        src: "/etc/sm/{{ software_version }}/sm.db"
        dest: /var/run/sm/sm.db
        remote_src: yes

    - name: Re-initialize postgres DB
      command: >-
        {{ pg_bindir.stdout | trim }}/initdb -D {{ pg_datadir }}
      become_user: postgres

    - name: Start postgres via OCF script
      command: /usr/lib/ocf/resource.d/heartbeat/pgsql start
      environment:
        OCF_ROOT: /usr/lib/ocf
        OCF_RESKEY_pgctl: "{{ pg_bindir.stdout | trim }}/pg_ctl"
        OCF_RESKEY_pgdata: "{{ pg_datadir }}"
      timeout: 30

  vars:
    pg_datadir: "/var/lib/postgresql/{{ software_version }}"
  when: factory_restore | default(false)

- name: Shutdown mtcAgent and flock services
  block:
    - name: Shutdown mtcAgent
      command: /usr/lib/ocf/resource.d/platform/mtcAgent stop
      environment:
        OCF_ROOT: "/usr/lib/ocf"
        OCF_RESKEY_state: "active"

    - name: Stop flock services
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - "{{ 'keystone' if os_release == 'debian' else 'openstack-keystone' }}"
        - fminit
        - fm-api
        - sysinv-conductor
        - sysinv-agent
        - sysinv-api
        - mtcClient
        - "{{ 'barbican-api' if os_release == 'debian' else 'openstack-barbican-api' }}"
        - sm-api

  when: not (factory_restore | default(false))

- name: Restore Postgres
  import_role:
    name: backup-restore/restore-postgres

# Update boot/rootfs device if factory system differs from backup.
# Same hardware model may have different disk SAS addresses.
- name: Update boot and rootfs device for factory restore
  block:
    - name: Get backup boot and rootfs device from restored DB
      shell: >-
        psql -t -A -F',' -c
        "SELECT boot_device, rootfs_device FROM i_host
         WHERE hostname='controller-0';" sysinv
      register: backup_host_devices

    - name: Parse factory devices
      set_fact:
        factory_boot: "{{ factory_host_devices.stdout.split(',')[0] }}"
        factory_rootfs: "{{ factory_host_devices.stdout.split(',')[1] }}"

    - name: Parse backup devices
      set_fact:
        backup_boot: "{{ backup_host_devices.stdout.split(',')[0] }}"
        backup_rootfs: "{{ backup_host_devices.stdout.split(',')[1] }}"

    - name: Log boot/rootfs device comparison
      debug:
        msg:
          - "Factory: {{ factory_boot }},{{ factory_rootfs }}"
          - "Backup: {{ backup_boot }},{{ backup_rootfs }}"

    - name: Update boot_device if different
      shell: >-
        psql -c "UPDATE i_host
        SET boot_device='{{ factory_boot }}'
        WHERE hostname='controller-0';" sysinv
      when: factory_boot != backup_boot

    - name: Update rootfs_device if different
      shell: >-
        psql -c "UPDATE i_host
        SET rootfs_device='{{ factory_rootfs }}'
        WHERE hostname='controller-0';" sysinv
      when: factory_rootfs != backup_rootfs
  become_user: postgres
  when: factory_restore

- name: Upgrade path
  block:
    # N3000 reset requires running a container,
    # containerd hasn't been setup yet so it's unavailable.
    # Creating this flag will have the reset be skipped during migration if it's triggered.
    # This flag is deleted on reboot so reset will still be done after unlock.
    - name: Disable N3000 reset during migration
      file:
        name: /var/run/.sysinv_n3000_reset
        state: touch
      become: true

    - name: Migrate databases and platform data
      command: "upgrade_controller_simplex {{ restore_data_file }}"
      register: migration_output

    - debug:
        var: migration_output.stdout_lines

    # Shell required for wildcard
    - name: Migrate remaining config data
      shell: "mv {{ src }} {{ dest }}"
      failed_when: false
      vars:
        src: "/opt/platform/config/{{ previous_software_version }}/{*,.*}"
        dest: "/opt/platform/config/{{ software_version }}"

    - name: Update postgresql pg_hba.conf with IPv6 address if system is IPv6
      command: "{{ item }}"
      args:
        warn: false
      with_items:
        - >-
          sed --follow-symlinks -i -e 's|0.0.0.0/0|::0/0|g'
          /etc/postgresql/{{ '17/main/' if is_trixie else '' }}pg_hba.conf
        - >-
          sed --follow-symlinks -i -e 's|0.0.0.0/32|::0/128|g'
          /etc/postgresql/{{ '17/main/' if is_trixie else '' }}pg_hba.conf
      when: ipv6_addressing is defined and ipv6_addressing != False

  when: upgrade_in_progress

# restore-more-data/tasks/main.yml#459
# Set all the hosts including controller-0 to locked/disabled/offline state.
# After the services are restarted, mtce will update controller-0 to
# locked/disabled/online state. Setting controller-0 to offline state now
# will ensure that keystone, sysinv and mtcAgent are indeed in-service after being restarted.
- name: Set all the hosts to locked/disabled/offline state
  shell: >-
    psql -c "update i_host set administrative='locked', operational='disabled',
    availability='offline'" sysinv
  become_user: postgres

# Container images may not be present after restore. Inform sysinv so it
# can download the images. Kubernetes will then start the apps.
- name: Set applied apps to "restore-requested" state
  shell: psql -c "update kube_app set status='restore-requested' where status='applied'" sysinv
  become_user: postgres

- name: Set platform-integ-apps to applied state when set to wipe osds disks to remove the app later
  command: >-
    psql -c "update kube_app set status='applied' where name='platform-integ-apps'
    and status='restore-requested'" sysinv
  become_user: postgres
  when: wipe_ceph_osds|bool

- name: Set rook-ceph to applied state when set to wipe osds disks to remove the app later
  command: >-
    psql -c "update kube_app set status='applied' where name='rook-ceph'
    and status='restore-requested'" sysinv
  become_user: postgres
  when: wipe_ceph_osds|bool

# For factory restore, update db where current system's LV size is
# greater than backup's.
- name: Update factory LV sizes in restored db during factory restore
  shell: >-
    psql -c "UPDATE {{ item.db_table }} SET size={{ item.current_size }}
    WHERE name='{{ item.fs_name }}'" sysinv
  become_user: postgres
  loop: "{{ lvs_to_update_after_db_restore }}"
  loop_control:
    label: "{{ item.db_table }}.{{ item.fs_name }} → {{ item.current_size }}G"
  when:
    - factory_restore | default(false)
    - lvs_to_update_after_db_restore | default([]) | length > 0

# Ensure hostwd sees the node as locked during optimized restore.
# Normally mtcClient creates those flags, but it's stopped here.
# Without those flags, hostwd may trigger a crashdump on quorum failure.
- name: Ensure node lock flags exist for hostwd
  file:
    path: "{{ item }}"
    state: touch
  loop:
    - /var/run/.node_locked
    - /var/persist/mtc/.node_locked

- name: Bringup flock services and mtcAgent
  block:
    - name: Bringup flock services
      systemd:
        name: "{{ item }}"
        state: restarted
      loop:
        - "{{ 'keystone' if os_release == 'debian' else 'openstack-keystone' }}"
        - fminit
        - fm-api
        - sysinv-conductor
        - sysinv-agent
        - sysinv-api
        - mtcClient
        - "{{ 'barbican-api' if os_release == 'debian' else 'openstack-barbican-api' }}"
        - sm-api

    - name: Bringup mtcAgent
      command: "/usr/lib/ocf/resource.d/platform/mtcAgent start"
      environment:
        OCF_ROOT: "/usr/lib/ocf"
        OCF_RESKEY_state: "active"

  when: not (factory_restore | default(false))

# Start SM, then use sm-start to bring up
# services, during factory restore
- name: Start up SM and services during factory restore
  block:
    - name: Start SM services
      command: pmon-start sm

    - name: Start/ manage postgres via SM
      command: sm-start service postgres

    - name: Start services via SM
      command: "sm-start service {{ item }}"
      loop:
        - rabbit
        - sysinv-conductor
        - "{{ 'keystone' if os_release == 'debian' else 'openstack-keystone' }}"
        - "{{ 'barbican-api' if os_release == 'debian' else 'openstack-barbican-api' }}"
        - haproxy
        - mtc-agent

    - name: Start pmon-managed flock services
      command: "pmon-start {{ item }}"
      loop:
        - fm-api
        - sysinv-agent
        - mtcClient

  when: factory_restore | default(false)

# Verify rook-ceph user-overrides were preserved in the restored DB.
# The postgres dump restores helm_overrides table in full. This check
# confirms nothing was lost during the initdb + psql cycle by comparing
# chart names and a content hash (user_overrides may be multi-line YAML).
- name: Verify rook-ceph user-overrides in restored DB
  block:
    - name: Query rook-ceph user_overrides from restored DB
      shell: >-
        psql -t -A -c
        "SELECT ho.name || '=' || md5(ho.user_overrides)
         FROM helm_overrides ho
         JOIN kube_app ka ON ho.app_id = ka.id
         WHERE ka.name='rook-ceph'
         AND ho.user_overrides IS NOT NULL
         AND ho.user_overrides != ''" sysinv
      become_user: postgres
      register: restored_user_overrides_raw

    - name: Parse restored user-overrides into chart=hash map
      set_fact:
        restored_overrides_map: >-
          {{ dict(restored_user_overrides_raw.stdout_lines
             | map('split', '=', 1)
             | list) }}

    - name: Log restored user-overrides comparison
      debug:
        msg:
          - "Expected charts: {{ backup_rook_user_overrides_data.keys() | list }}"
          - "Restored charts: {{ restored_overrides_map.keys() | list }}"

    - name: Fail if user-overrides charts are missing after restore
      fail:
        msg: >-
          Rook-ceph user-overrides charts missing after postgres restore.
          Expected: {{ backup_rook_user_overrides_data.keys() | list }}.
          Found: {{ restored_overrides_map.keys() | list }}.
      when: >-
        (backup_rook_user_overrides_data.keys() | list | sort) !=
        (restored_overrides_map.keys() | list | sort)

    - name: Verify user-overrides content integrity
      shell: >-
        psql -t -A -c
        "SELECT ho.user_overrides FROM helm_overrides ho
         JOIN kube_app ka ON ho.app_id = ka.id
         WHERE ka.name='rook-ceph' AND ho.name='{{ item.key }}'" sysinv
      become_user: postgres
      register: db_override_content
      loop: "{{ backup_rook_user_overrides_data | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Fail if user-overrides content differs after restore
      fail:
        msg: >-
          Rook-ceph user-overrides content mismatch for chart
          '{{ item.item.key }}'.
      when: item.stdout != item.item.value
      loop: "{{ db_override_content.results }}"
      loop_control:
        label: "{{ item.item.key }}"
  when:
    - factory_restore | default(false)
    - backup_has_rook_user_overrides | default(false)
