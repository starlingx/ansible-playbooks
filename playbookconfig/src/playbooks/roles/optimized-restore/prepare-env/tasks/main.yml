# ROLE DESCRIPTION:
#   Prepare environment for optimized restore.

#  Detect factory install
- name: Check if system is a factory install
  stat:
    path: /var/lib/factory-install/complete
  register: factory_install_flag

- name: Auto-set factory_restore if factory install detected
  set_fact:
    factory_restore: true
  when: factory_install_flag.stat.exists

- name: Factory install not detected, but factory_restore explicitly passed
  set_fact:
    factory_restore: "{{ factory_restore | default(false) | bool }}"
  when:
    - not factory_install_flag.stat.exists
    - factory_restore is defined

- name: Factory restore pre-checks
  block:
    - name: Retrieve system mode from platform.conf
      shell: source /etc/platform/platform.conf; echo $system_mode
      register: system_mode_result

    - name: Set system mode fact
      set_fact:
        system_mode: "{{ system_mode_result.stdout }}"

    - name: Fail if factory restore is not AIO-SX
      fail:
        msg: >-
          Factory restore is only supported on AIO-SX systems.
          Detected system_type={{ system_type }} system_mode={{ system_mode }}.
      when: system_type != 'All-in-one' or system_mode != 'simplex'

    - name: Fail if wipe_ceph_osds requested on factory restore
      fail:
        msg: >-
          wipe_ceph_osds is not supported with factory restore.
      when: wipe_ceph_osds | default(false) | bool

    - name: Check if bare-metal Ceph is configured
      stat:
        path: /etc/platform/.node_ceph_configured
      register: factory_ceph_baremetal_flag

    - name: Fail if bare-metal Ceph is detected on factory system
      fail:
        msg: >-
          Factory restore does not support bare-metal Ceph backend.
          /etc/platform/.node_ceph_configured was found on this system.
      when: factory_ceph_baremetal_flag.stat.exists

    - name: Auto-detect management MAC for factory restore
      block:
        - name: Get management interface MAC from factory system
          shell: >-
            cat /sys/class/net/$(source /etc/platform/platform.conf;
            echo $management_interface)/address
          register: factory_mgmt_mac

        - name: Auto-set replacement_mgmt_mac for factory restore
          set_fact:
            replacement_mgmt_mac: "{{ factory_mgmt_mac.stdout | lower }}"
            replacement_mgmt_mac_required: true
      when: replacement_mgmt_mac is none or replacement_mgmt_mac == ''

    - name: Lock controller-0 for factory restore
      include_role:
        name: common/host-lock
      vars:
        target_host: controller-0

  when: factory_restore

- name: Detect factory storage backend
  block:
    - name: Look for the flag indicating that LVM CSI is configured
      stat:
        path: /etc/platform/.node_lvm_csi_configured
      register: factory_lvm_flag

    - name: Look for the flag indicating that Rook is configured
      stat:
        path: /etc/platform/.node_rook_configured
      register: factory_rook_flag

    - name: Set factory_storage_backend to lvm
      set_fact:
        factory_storage_backend: "lvm"
      when: factory_lvm_flag.stat.exists

    - name: Set factory_storage_backend to rook-ceph
      set_fact:
        factory_storage_backend: "rook-ceph"
      when:
        - not factory_lvm_flag.stat.exists
        - factory_rook_flag.stat.exists

    - name: Fail if no supported storage backend is detected
      fail:
        msg: >-
          Unsupported storage backend for factory restore.
          Neither /etc/platform/.node_lvm_csi_configured nor
          /etc/platform/.node_rook_configured were found on this system.
      when:
        - not factory_lvm_flag.stat.exists
        - not factory_rook_flag.stat.exists

    - name: Log detected factory storage backend
      debug:
        msg: "Factory storage backend detected: {{ factory_storage_backend }}"

  when: factory_restore | default(false)

- name: Set config path facts
  set_fact:
    keyring_permdir: "{{ platform_path + '/.keyring/' + software_version }}"
    config_permdir: "{{ platform_path + '/config/' + software_version }}"
    sysinv_permdir: "{{ platform_path + '/sysinv/' + software_version }}"
    puppet_permdir: "{{ platform_path + '/puppet/' + software_version }}"
    images_archive_dir: "/opt/platform-backup/{{ software_version }}"

- name: Set config path facts for restore
  set_fact:
    branding_permdir: "{{ config_permdir }}/branding"
    banner_permdir: "{{ config_permdir }}/banner/etc"
    ssh_config_permdir: "{{ config_permdir }}/ssh_config"
    pxe_config_permdir: "{{ config_permdir }}/pxelinux.cfg"
    fluxcd_permdir: "{{ platform_path }}/fluxcd/"
    helm_overrides_permdir: "{{ platform_path + '/helm/' + software_version }}"
    sysinv_config_permdir: "{{ platform_path + '/sysinv/' + software_version }}"

- name: Check bootstrap status for non-factory restore
  block:
    - name: Check if bootstrap_finalized flag exists on host
      stat:
        path: "{{ config_permdir }}/.bootstrap_finalized"
      register: bootstrap_finalized_flag

    - name: Fail if host is unlocked or host configurations have already started
      fail:
        msg: Restore cannot be performed on deployed host, reinstall the system before trying again.
      when: bootstrap_finalized_flag.stat.exists
  when: not factory_restore

- name: Set restore file parameter
  set_fact:
    restore_data_file: "{{ target_backup_dir }}/{{ backup_filename }}"
  when: not upgrade_in_progress

- name: Set restore file parameter
  set_fact:
    platform_backup_fqpn: "{{ restore_data_file }}"
  when: upgrade_in_progress

- name: Validate factory compatibility
  block:
    - name: Gather factory hardware facts
      setup:
        gather_subset:
          - hardware

    - name: Set postgres staging directory path
      set_fact:
        postgres_staging_dir: "{{ staging_dir }}/postgres"

    - name: Create postgres staging directory for factory restore
      file:
        path: "{{ postgres_staging_dir }}"
        state: directory
        owner: root
        group: root
        mode: 0755
      become: yes

    - name: Extract postgres dump to staging directory
      command: >-
        tar --use-compress-program=pigz -C {{ postgres_staging_dir }}
        -xpf {{ initial_backup_dir }}/{{ backup_filename }}
        --wildcards --transform='s,.*/,,' '*/*\.postgreSql\.*'
      become: yes

    - name: Check backup is from simplex system
      shell: >-
        grep 'INSERT INTO public.i_system VALUES'
        {{ postgres_staging_dir }}/sysinv.postgreSql.data
        | grep -q "'simplex'"
      register: backup_simplex_check
      failed_when: false

    - name: Fail if backup is not from simplex
      fail:
        msg: "Factory restore only supports simplex backups."
      when: backup_simplex_check.rc != 0

    - name: Get backup CPU topology
      script: check_backup_factory_data.py cpu {{ postgres_staging_dir }}/sysinv.postgreSql.data
      register: backup_cpu_info

    - name: Set factory CPU topology
      set_fact:
        factory_cpu_info: >-
          {{ ansible_processor_vcpus }},{{ ansible_processor_count }},{{
          ansible_processor_cores * ansible_processor_count }},{{
          ansible_processor_threads_per_core }}

    - name: Fail if factory has insufficient CPU capacity
      fail:
        msg: >-
          Factory CPU capacity insufficient.
          Backup: {{ backup_cpu_info.stdout }} (cpus,sockets,cores,threads).
          Factory: {{ factory_cpu_info }} (cpus,sockets,cores,threads).
      vars:
        backup_cpus: "{{ backup_cpu_info.stdout.split(',') }}"
        factory_cpus: "{{ factory_cpu_info.split(',') }}"
      when: >-
        backup_cpus[0] | int > factory_cpus[0] | int or
        backup_cpus[1] | int > factory_cpus[1] | int or
        backup_cpus[2] | int > factory_cpus[2] | int or
        backup_cpus[3] | int > factory_cpus[3] | int

    - name: Get backup PCI device IDs
      script: check_backup_factory_data.py pci {{ postgres_staging_dir }}/sysinv.postgreSql.data
      register: backup_pci_ids

    - name: Get factory PCI vendor:device IDs
      shell: >-
        lspci -n | awk '{print $3}' | sort -u
      register: factory_pci_ids

    - name: Fail if backup has PCI devices not present on factory
      fail:
        msg: >-
          PCI device mismatch. Backup has devices not found on factory system.
          Missing: {{ backup_pci_ids.stdout_lines | difference(factory_pci_ids.stdout_lines) }}
      when: (backup_pci_ids.stdout_lines | difference(factory_pci_ids.stdout_lines)) | length > 0

    # Per-LV validation: reject if any factory LV is smaller than backup
    - name: Compare individual filesystem sizes
      script: check_backup_factory_data.py fs {{ postgres_staging_dir }}/sysinv.postgreSql.data
      register: lv_per_check
      failed_when: lv_per_check.rc == 2
      become: yes

    - name: Fail if factory filesystems are smaller than backup
      fail:
        msg: >-
          Factory filesystems smaller than backup.
          {{ lv_per_check.stdout }}
      when: lv_per_check.rc == 1

    # Validate factory rook-ceph cluster health before restore.
    # If Ceph is unhealthy, there is no point proceeding as the
    # storage backend cannot be adopted.
    - name: Validate factory rook-ceph health
      block:
        - name: Get Ceph cluster status
          command: ceph -s --format json
          register: ceph_status_raw
          timeout: 30

        - name: Get backup OSD count
          shell: >-
            grep "INSERT INTO public.i_istor VALUES"
            {{ postgres_staging_dir }}/sysinv.postgreSql.data
            | grep -c "'osd'"
          register: backup_osd_count

        - name: Check CSI RBD pods running
          shell: >-
            kubectl get pods -n rook-ceph
            --field-selector=status.phase=Running -o name | grep -c "rbd.*csi\|csi.*rbd"
          register: csi_count

        - name: Check StorageClass available
          shell: >-
            kubectl get sc -o name | wc -l
          register: sc_count

        - name: Parse rook-ceph validation results
          set_fact:
            ceph_status: "{{ (ceph_status_raw.stdout | from_json).health.status }}"
            factory_osds: "{{ (ceph_status_raw.stdout | from_json).osdmap.num_osds }}"

        - name: Log rook-ceph validation results
          debug:
            msg:
              - "Ceph health: {{ ceph_status }}"
              - "Factory OSDs: {{ factory_osds }}"
              - "Backup OSDs: {{ backup_osd_count.stdout }}"
              - "CSI RBD pods: {{ csi_count.stdout }}"
              - "StorageClasses: {{ sc_count.stdout }}"

        - name: Log full Ceph cluster status
          debug:
            msg: "{{ ceph_status_raw.stdout | from_json }}"

        - name: Fail if Ceph is not HEALTH_OK
          fail:
            msg: >-
              Factory rook-ceph cluster is {{ ceph_status }}.
              Only HEALTH_OK is acceptable for factory restore.
          when: ceph_status != 'HEALTH_OK'

        - name: Fail if OSD count mismatch
          fail:
            msg: >-
              OSD count mismatch. Factory has {{ factory_osds }} OSDs
              but backup has {{ backup_osd_count.stdout }} OSDs.
              Both must be identical.
          when: factory_osds | int != backup_osd_count.stdout | int

        - name: Fail if no CSI RBD pods running
          fail:
            msg: >-
              No CSI RBD pods running in rook-ceph namespace.
          when: csi_count.stdout | int == 0

        - name: Fail if no StorageClass available
          fail:
            msg: >-
              No StorageClass available for rook-ceph storage.
          when: sc_count.stdout | int == 0

        # Save rook-ceph K8s state before etcd restore overwrites it.
        # After etcd restore, secrets/configmap/deployment will have the
        # backup system's values, but MON's persistent data on disk still
        # has the factory's keys and FSID. We patch these back after
        # etcd restore to keep Ceph auth consistent.
        - name: Create temp directory for rook-ceph state
          file:
            path: /tmp/factory_rook_ceph_restore
            state: directory

        - name: Save all factory rook-ceph secrets
          shell: >-
            kubectl get secrets -n rook-ceph
            --field-selector type!=helm.sh/release.v1
            -o json > /tmp/factory_rook_ceph_restore/secrets.json

        - name: Save factory rook-ceph mon-endpoints configmap
          shell: >-
            kubectl get configmap -n rook-ceph rook-ceph-mon-endpoints
            -o json > /tmp/factory_rook_ceph_restore/configmap.json

        - name: Get rook-ceph monitor deployment name
          shell: >-
            kubectl get deploy -n rook-ceph -l app=rook-ceph-mon
            -o jsonpath='{.items[0].metadata.name}'
          register: rook_ceph_mon_name

        - name: Save factory rook-ceph mon deployment
          shell: >-
            kubectl get deploy -n rook-ceph {{ rook_ceph_mon_name.stdout }}
            -o json > /tmp/factory_rook_ceph_restore/mon_deploy.json

        - name: Save factory rook-ceph mon service
          shell: >-
            kubectl get svc -n rook-ceph {{ rook_ceph_mon_name.stdout }}
            -o json > /tmp/factory_rook_ceph_restore/mon_svc.json

        - name: Save factory rook-ceph CephCluster Custom Resource
          shell: >-
            kubectl get cephcluster -n rook-ceph rook-ceph
            -o json > /tmp/factory_rook_ceph_restore/cephcluster.json

      become: yes
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      when: factory_storage_backend | default('') == 'rook-ceph'

  when: factory_restore

- name: Detect storage metadata in backup
  block:
    - name: Detect storage metadata from backup postgres dump
      script: detect_backup_storage_metadata.py {{ postgres_staging_dir }}/sysinv.postgreSql.data
      register: storage_metadata_raw

    - name: Parse storage metadata detection result
      set_fact:
        backup_storage_metadata: "{{ storage_metadata_raw.stdout | from_json }}"

    - name: Log detected storage metadata
      debug:
        msg:
          - "Storage backend: {{ backup_storage_metadata.primary_backend | default('not detected') }}"
          - "Rook-ceph user-overrides present: {{ backup_storage_metadata.rook_ceph_overrides.has_user_overrides }}"
          - "Charts with user-overrides: {{ backup_storage_metadata.rook_ceph_overrides.charts_with_user_overrides }}"

    - name: Set user-overrides facts for downstream
      set_fact:
        backup_has_rook_user_overrides: "{{ backup_storage_metadata.rook_ceph_overrides.has_user_overrides }}"
        backup_rook_user_overrides_data: "{{ backup_storage_metadata.rook_ceph_overrides.user_overrides_data }}"

  when: factory_restore

- name: Set image backup filename
  block:
    - name: Copy backup_filename
      set_fact:
        tmp_filename: "{{ backup_filename }}"

    - name: Strip gpg extension when the backup_filename is encrypted
      set_fact:
        tmp_filename: "{{ tmp_filename | regex_replace('[.]gpg$') }}"
      when: backup_encryption_enabled|bool

    - name: Set image backup filename for user images method
      set_fact:
        registry_backup_filename: "{{ tmp_filename.replace(default_backup_mark, default_user_images_backup_mark) }}"
      when: restore_user_images

    - name: Set image backup filename for registry backup method
      set_fact:
        registry_backup_filename: "{{ tmp_filename.replace(default_backup_mark, default_registry_backup_mark) }}"
      when: restore_registry_filesystem | bool

  when: not registry_backup_filename|default(none)

- name: Prepare for upgrade
  block:
    - name: Set upgrade facts
      set_fact:
        previous_software_version: "{{ upgrade_metadata.from_release }}"
        kubernetes_version: "{{ upgrade_k8s_version }}"

  when: upgrade_in_progress

- name: Non-upgrade path
  block:
    - name: Set previous software version for non-upgrade
      set_fact:
        previous_software_version: "{{ software_version }}"

    - name: Set etcd_version for restores
      set_fact:
        etcd_version: "{{ restore_etcd_version }}"
      when: restore_etcd_version is defined and restore_etcd_version|length > 0

  when: not upgrade_in_progress

- name: Check if the prestaged registry filesystem exists
  stat:
    path: "{{ images_archive_dir }}/local_registry_filesystem.tgz"
  register: prestage_registry_filesystem
