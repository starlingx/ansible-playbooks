#
# This playbook is intended to be run on system controller.
#
# It provides the capability to migrate the storage backend used.
#
# To run the playbook, the user would define the required variable settings
# passing this on the ansible command-line as a parameter.
#
# Parameters are:
#
# - target_list
# - migration_type: redeploy, export-import or in-service
# - migration_target: rook-ceph or lvm
#
# To run the playbook, the user would define an overrides file that
# provides the required variable settings, passing this on the ansible
# command-line as a parameter.
# (see storage-backend-migration-inventory-EXAMPLE.yaml)
#
#
# Example command:
# ansible-playbook /usr/share/ansible/stx-ansible/playbooks/storage-backend-migration-subcloud.yaml -v \
#     -i my_inventory.yaml \
#     --extra-vars "target_list=subcloud1 migration_type=redeploy migration_target=rook-ceph"
#
# Use target_list to target individual subclouds, or a comma-separated
# list of subclouds such as 'subcloud1,subcloud2'. To target all online
# subclouds at once use target_list=all_online_subclouds
#
#
# Optional extra variables:
#
# - osd_usage_safety_margin_percent: 0 <= int <= 100.
# - cgts_vg_min_required_free_gib: 1 <= int <= 100
# - minimum_platform_mem_workers: 1000 <= int <= 100000
# - storage_backend_migration_backup_dir: string
# - backups_path: <path/to/backups> (for export-import migration type or in-service if using kube-rbdkube-system pool)
# - backups_min_safety_margin_bytes: int
# - backups_max_safety_margin_percent: 0 <= int <= 100
# - erase_snapshots: bool
# - allow_out_of_sync: bool
# - lvm_mode: thick or thin
# - lvm_thin_disk: root or dedicated
# - lvm_devices: list of device paths (e.g., ["/dev/disk/by-path/..."]). Defaults to all Ceph devices.
# - lvm_volume_size_gb: half, all, or a positive integer in GB (LVM thin uses half of available space by default)
# - lvm_vg_name: string
# - pvcs_to_migrate: list of PVC names to migrate (selective migration)
# - confirm_pvcs_regex: bool - confirm PVC regex selection and proceed with migration
# - pre_migration_hook: URI (file://, http://, https://) - must be reachable from the SystemController
# - post_migration_hook: URI (file://, http://, https://) - must be reachable from the SystemController

- hosts: localhost
  gather_facts: no
  vars_files:
    - vars/common/main.yml
  tasks:
    - name: Get all online subclouds in the system
      block:
        - name: Get online subclouds from dcmanager
          shell: |
            source /etc/platform/openrc
            dcmanager subcloud list -c name -c availability | awk ' $4 == "online" { print $2 }'
          register: subclouds

        - name: Add host to target_group
          add_host:
            name: "{{ item }}"
            groups: target_group
          with_items: "{{ subclouds.stdout_lines }}"

      when:
        - target_list is defined
        - "'all_online_subclouds' in target_list"

    - name: Get subcloud from extra-vars
      add_host:
        name: "{{ item }}"
        groups: target_group
      with_items: "{{ target_list.split(',') }}"
      when:
        - target_list is defined
        - "item != 'all_online_subclouds'"

- hosts: target_group
  gather_facts: no
  vars:
    valid_migration_types:
      - redeploy
      - export-import
      - in-service
    valid_migration_targets:
      - rook-ceph
      - lvm
    valid_lvm_modes:
      - thick
      - thin
    valid_lvm_thin_disks:
      - root
      - dedicated
    tmp_path: "/tmp/{{ migration_target }}-migration"
    hook_tmp_dir: "{{ tmp_path }}/hooks"
  vars_files:
    - vars/common/main.yml

  roles:
    - common/check-connectivity

  tasks:

    - name: Ensure migration_target is defined and valid
      assert:
        that:
          - migration_target is defined
          - migration_target in valid_migration_targets
        fail_msg: >-
          Invalid or missing migration_target.
          Must be one of: {{ valid_migration_targets | join(', ') }}.
          Current value: {{ migration_target | default('undefined') }}
        success_msg: "Migration target validated: {{ migration_target | default('undefined') }}"

    - name: Ensure migration_type is defined and valid
      assert:
        that:
          - migration_type is defined
          - migration_type in valid_migration_types
        fail_msg: >-
          Invalid or missing migration_type.
          Must be one of: {{ valid_migration_types | join(', ') }}.
          Current value: {{ migration_type | default('undefined') }}
        success_msg: "Migration type validated: {{ migration_type | default('undefined') }}"

    - name: Ensure in-service migration is not used with LVM target
      fail:
        msg: "In-service migration not supported for LVM target"
      when:
        - migration_target == "lvm"
        - migration_type == "in-service"

    - name: Validate OSD safety margin
      assert:
        that:
          - osd_usage_safety_margin_percent | int >= 0 and osd_usage_safety_margin_percent | int <= 100
        fail_msg: "osd_usage_safety_margin_percent must be between 0 and 100, got: {{ osd_usage_safety_margin_percent }}"
      when: osd_usage_safety_margin_percent is defined

    - name: Validate cgts_vg_min_required_free_gib
      assert:
        that:
          - cgts_vg_min_required_free_gib | int >= 1 and cgts_vg_min_required_free_gib | int <= 100
        fail_msg: "cgts_vg_min_required_free_gib must be between 1 and 100, got: {{ cgts_vg_min_required_free_gib }}"
      when: cgts_vg_min_required_free_gib is defined

    - name: Validate minimum_platform_mem_workers
      assert:
        that:
          - minimum_platform_mem_workers | int >= 1000 and minimum_platform_mem_workers | int <= 100000
        fail_msg: "minimum_platform_mem_workers must be between 1000 and 100000, got: {{ minimum_platform_mem_workers }}"
      when: minimum_platform_mem_workers is defined

    - name: Validate storage_backend_migration_backup_dir
      assert:
        that:
          - storage_backend_migration_backup_dir | length > 0
        fail_msg: "storage_backend_migration_backup_dir must be a non-empty string"
      when: storage_backend_migration_backup_dir is defined

    - name: Validate backups_max_safety_margin_percent
      assert:
        that:
          - backups_max_safety_margin_percent | int >= 0 and backups_max_safety_margin_percent | int <= 100
        fail_msg: >
          "backups_max_safety_margin_percent must be between 0 and 100,
          got: {{ backups_max_safety_margin_percent }}"
      when: backups_max_safety_margin_percent is defined

    - name: Validate backups_min_safety_margin_bytes
      assert:
        that:
          - backups_min_safety_margin_bytes | int is integer
        fail_msg: >
          backups_min_safety_margin_bytes must be an integer,
          got: {{ backups_min_safety_margin_bytes }}
      when: backups_min_safety_margin_bytes is defined

    - name: Validate backups_path
      assert:
        that:
          - backups_path | length > 0
        fail_msg: "backups_path must be a non-empty string"
      when: backups_path is defined

    - name: Validate erase_snapshots
      assert:
        that:
          - erase_snapshots == "true" or erase_snapshots == "false"
        fail_msg: "erase_snapshots must be a bool"
      when: erase_snapshots is defined

    - name: Validate allow_out_of_sync
      assert:
        that:
          - allow_out_of_sync == "true" or allow_out_of_sync == "false"
        fail_msg: "allow_out_of_sync must be a bool"
      when: allow_out_of_sync is defined

    - name: Validate lvm_mode
      assert:
        that:
          - lvm_mode is defined
          - lvm_mode in valid_lvm_modes
        fail_msg: >-
          Invalid lvm_mode.
          Must be one of: {{ valid_lvm_modes | join(', ') }}.
          Current value: {{ lvm_mode | default('undefined') }}
        success_msg: "LVM mode validated: {{ lvm_mode }}"
      when: lvm_mode is defined

    - name: Validate lvm_thin_disk
      assert:
        that:
          - lvm_thin_disk is defined
          - lvm_thin_disk in valid_lvm_thin_disks
        fail_msg: >-
          Invalid lvm_thin_disk.
          Must be one of: {{ valid_lvm_thin_disks | join(', ') }}.
          Current value: {{ lvm_thin_disk | default('undefined') }}
        success_msg: "LVM thin disk mode validated: {{ lvm_thin_disk }}"
      when: lvm_thin_disk is defined

    - name: Validate lvm_devices
      assert:
        that:
          - lvm_devices is sequence and lvm_devices is not string
        fail_msg: "lvm_devices must be a list"
      when: lvm_devices is defined

    - name: Validate lvm_volume_size_gb
      assert:
        that:
          - lvm_volume_size_gb == "half" or lvm_volume_size_gb == "all" or (lvm_volume_size_gb is match("^[0-9]+$") and lvm_volume_size_gb | int > 0)
        fail_msg: "lvm_volume_size_gb must be 'half', 'all', or a positive integer in GB, got: {{ lvm_volume_size_gb }}"
        success_msg: "LVM volume size validated: {{ lvm_volume_size_gb }}"
      when: lvm_volume_size_gb is defined

    - name: Validate lvm_vg_name
      assert:
        that:
          - lvm_vg_name | length > 0
        fail_msg: "lvm_vg_name must be a non-empty string"
      when: lvm_vg_name is defined

    - name: Validate pre_migration_hook URI scheme
      assert:
        that:
          - pre_migration_hook is match('^(file|https?)://')
        fail_msg: >-
          Invalid pre_migration_hook URI: '{{ pre_migration_hook }}'.
          Must start with file://, http://, or https://.
      when: pre_migration_hook is defined

    - name: Validate post_migration_hook URI scheme
      assert:
        that:
          - post_migration_hook is match('^(file|https?)://')
        fail_msg: >-
          Invalid post_migration_hook URI: '{{ post_migration_hook }}'.
          Must start with file://, http://, or https://.
      when: post_migration_hook is defined

    - name: Validate pvcs_to_migrate
      assert:
        that:
          - pvcs_to_migrate is sequence and pvcs_to_migrate is not string
        fail_msg: "pvcs_to_migrate must be a list"
      when: pvcs_to_migrate is defined

    - name: Validate confirm_pvcs_regex
      assert:
        that:
          - confirm_pvcs_regex == "true" or confirm_pvcs_regex == "false"
        fail_msg: "confirm_pvcs_regex must be a bool"
      when: confirm_pvcs_regex is defined

    - name: Create hook scripts directory on SystemController
      file:
        path: "{{ hook_tmp_dir }}"
        state: directory
        mode: "0755"
      when: pre_migration_hook is defined or post_migration_hook is defined

    - name: Download pre_migration_hook script to SystemController
      get_url:
        url: "{{ pre_migration_hook }}"
        dest: "{{ hook_tmp_dir }}/pre_migration_hook"
        mode: "0755"
        force: true
      when: pre_migration_hook is defined

    - name: Download post_migration_hook script to SystemController
      get_url:
        url: "{{ post_migration_hook }}"
        dest: "{{ hook_tmp_dir }}/post_migration_hook"
        mode: "0755"
        force: true
      when: post_migration_hook is defined

    - name: Persist hook_tmp_dir as host fact for cross-play access
      set_fact:
        hook_tmp_dir: "{{ hook_tmp_dir }}"
      when: pre_migration_hook is defined or post_migration_hook is defined

    - name: Build extra vars for inner playbook
      vars:
        _vars_dict: >-
          {{
            {}
            | combine({'osd_usage_safety_margin_percent': osd_usage_safety_margin_percent} if osd_usage_safety_margin_percent is defined else {})
            | combine({'cgts_vg_min_required_free_gib': cgts_vg_min_required_free_gib} if cgts_vg_min_required_free_gib is defined else {})
            | combine({'minimum_platform_mem_workers': minimum_platform_mem_workers} if minimum_platform_mem_workers is defined else {})
            | combine({'storage_backend_migration_backup_dir': storage_backend_migration_backup_dir} if storage_backend_migration_backup_dir is defined else {})
            | combine({'backups_path': backups_path} if backups_path is defined else {})
            | combine({'backups_min_safety_margin_bytes': backups_min_safety_margin_bytes} if backups_min_safety_margin_bytes is defined else {})
            | combine({'backups_max_safety_margin_percent': backups_max_safety_margin_percent} if backups_max_safety_margin_percent is defined else {})
            | combine({'erase_snapshots': erase_snapshots} if erase_snapshots is defined else {})
            | combine({'allow_out_of_sync': allow_out_of_sync} if allow_out_of_sync is defined else {})
            | combine({'lvm_mode': lvm_mode} if lvm_mode is defined else {})
            | combine({'lvm_thin_disk': lvm_thin_disk} if lvm_thin_disk is defined else {})
            | combine({'lvm_devices': lvm_devices} if lvm_devices is defined else {})
            | combine({'lvm_volume_size_gb': lvm_volume_size_gb} if lvm_volume_size_gb is defined else {})
            | combine({'lvm_vg_name': lvm_vg_name} if lvm_vg_name is defined else {})
            | combine({'pvcs_to_migrate': pvcs_to_migrate} if pvcs_to_migrate is defined else {})
            | combine({'confirm_pvcs_regex': confirm_pvcs_regex} if confirm_pvcs_regex is defined else {})
            | combine({'abort_discovery_if_not_confirm': true})
            | combine({'pre_migration_hook': 'file://' + hook_tmp_dir + '/pre_migration_hook'} if pre_migration_hook is defined else {})
            | combine({'post_migration_hook': 'file://' + hook_tmp_dir + '/post_migration_hook'} if post_migration_hook is defined else {})
          }}
      set_fact:
        extra_vars_arg: >-
          {{ "--extra-vars '" ~ (_vars_dict | to_json) ~ "'" if _vars_dict | length > 0 else '' }}

    - name: Display extra-vars argument
      debug:
        var: extra_vars_arg

    - name: Copy hook scripts, run migration, and cleanup
      block:
        - name: Create hook scripts directory on subcloud
          file:
            path: "{{ hook_tmp_dir }}"
            state: directory
            mode: "0755"
          when: pre_migration_hook is defined or post_migration_hook is defined

        - name: Copy pre_migration_hook script to subcloud
          copy:
            src: "{{ hostvars.localhost.hook_tmp_dir }}/pre_migration_hook"
            dest: "{{ hook_tmp_dir }}/pre_migration_hook"
            mode: "0755"
          when: pre_migration_hook is defined

        - name: Copy post_migration_hook script to subcloud
          copy:
            src: "{{ hostvars.localhost.hook_tmp_dir }}/post_migration_hook"
            dest: "{{ hook_tmp_dir }}/post_migration_hook"
            mode: "0755"
          when: post_migration_hook is defined

        - name: "Run migration playbook on subcloud"
          command: >
            ansible-playbook
            /usr/share/ansible/stx-ansible/playbooks/storage-backend-migration-{{ migration_target }}-{{ migration_type }}.yaml -v
            {{ extra_vars_arg }}
          environment:
            ANSIBLE_CONFIG: "/usr/share/ansible/stx-ansible/playbooks/vars/storage-backend-migration/ansible.cfg"
          register: migration_result
          failed_when:
            - migration_result.rc != 0
            - '"Discovery complete. Failed automatically; the playbook was triggered remotely." not in migration_result.stdout'

        - name: "Explain how to continue to the migration"
          debug:
            msg: 'Use -e "confirm_pvcs_regex=true" to continue to the migration'
          when: '"Discovery complete. Failed automatically; the playbook was triggered remotely." in migration_result.stdout'

      always:
        - name: Cleanup hook scripts from subcloud
          file:
            path: "{{ hook_tmp_dir }}"
            state: absent
          when: pre_migration_hook is defined or post_migration_hook is defined

        - name: Cleanup hook scripts from SystemController
          file:
            path: "{{ hostvars.localhost.hook_tmp_dir }}"
            state: absent
          delegate_to: localhost
          run_once: true
          when: pre_migration_hook is defined or post_migration_hook is defined
