#
# This playbook is designed to be used by dcmanager for the on-site restore
# workflow, where the restore is initiated locally by the subcloud itself.
#
# It monitors the subcloud until the restore completes by waiting for the
# auto-restore completion flag.
#
# Override variables:
#   restore_timeout:    (optional) Total timeout in seconds for the restore
#                       operation.
#
#   resume_mode:        (optional) When true, skip the "wait for subcloud to go
#                       offline" step. Used when dcmanager resumes monitoring
#                       after a system controller swact or service restart.
#
#   Example command:
#   ansible-playbook /usr/share/ansible/stx-ansible/playbooks/onsite_restore_subcloud.yml \
#   -i <inventory-file> --limit <subcloudname> -e 'restore_timeout=<restore_timeout>'
#
- hosts: all
  gather_facts: no
  vars:
    restore_timeout: 5400
    restore_complete_flag: /var/run/.auto_restore_complete
    resume_mode: false

  tasks:
    - name: Main restore workflow
      block:
        - name: Record restore start time
          set_fact:
            restore_start: "{{ now(fmt='%s') }}"

        - name: Wait for subcloud to go offline (restore initiated)
          wait_for:
            host: "{{ ansible_host }}"
            port: 22
            state: stopped
            timeout: 300
            sleep: 30
          delegate_to: localhost
          when: not resume_mode | bool

        - name: Wait for on-site restore completion
          block:
            - name: Wait for subcloud to become reachable
              wait_for_connection:
                delay: 30
                timeout: "{{ restore_timeout }}"
                sleep: 30

            - name: Calculate remaining timeout
              set_fact:
                remaining_timeout: >-
                  {{ [restore_timeout | int - (now(fmt='%s') | int - restore_start | int), 60] | max }}

            - name: Wait for restore completion flag
              wait_for:
                path: "{{ restore_complete_flag }}"
                timeout: "{{ remaining_timeout }}"
                sleep: 30
                msg: "Timeout waiting for on-site restore completion"
              register: flag_wait
              ignore_unreachable: true

            - name: Fail to trigger rescue if subcloud became unreachable
              fail:
                msg: "Subcloud became unreachable while waiting for restore completion flag"
              when: flag_wait.unreachable | default(false)

          rescue:
            # The subcloud may disconnect during the flag check (e.g. unlock reboot).
            # Reconnect with the remaining timeout and retry the flag check once.
            - name: Calculate remaining timeout after disconnection
              set_fact:
                remaining_timeout: >-
                  {{ [restore_timeout | int - (now(fmt='%s') | int - restore_start | int), 60] | max }}

            - name: Wait for subcloud to come back after reboot
              wait_for_connection:
                delay: 30
                timeout: "{{ remaining_timeout }}"
                sleep: 30

            - name: Calculate remaining timeout after reconnect
              set_fact:
                remaining_timeout: >-
                  {{ [restore_timeout | int - (now(fmt='%s') | int - restore_start | int), 60] | max }}

            - name: Wait for restore completion flag after reboot
              wait_for:
                path: "{{ restore_complete_flag }}"
                timeout: "{{ remaining_timeout }}"
                sleep: 30
                msg: "Timeout waiting for on-site restore completion after reboot"

      always:
        - name: Remove restore flag
          become: yes
          file:
            path: "{{ restore_complete_flag }}"
            state: absent
