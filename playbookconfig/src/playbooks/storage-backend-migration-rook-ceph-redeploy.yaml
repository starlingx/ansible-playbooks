#
# This playbook is intended to be run on standalone systems.
#
# It provides the capability to migrate the storage backend used.
#
# To run the playbook, the user would define the required variable settings
# passing this on the ansible command-line as a parameter.
#
#
# Example command:
#  ANSIBLE_CONFIG='/usr/share/ansible/stx-ansible/playbooks/vars/storage-backend-migration/ansible.cfg' \
#  ansible-playbook /usr/share/ansible/stx-ansible/playbooks/storage-backend-migration-rook-ceph-redeploy.yaml -v
#
# Optional extra variables:
#
# - osd_usage_safety_margin_percent: 0 <= int <= 100.
# - cgts_vg_min_required_free_gib: 1 <= int <= 100
# - minimum_platform_mem_workers: 1000 <= int <= 100000
# - storage_backend_migration_backup_dir: string
# - allow_out_of_sync: bool
#

- import_playbook: storage-backend-migration-init.yaml
  vars:
    migration_type: redeploy
    migration_target: rook_ceph

- import_playbook: storage-backend-migration-discovery.yaml

- name: Execute pre-checks
  hosts: active_controller
  gather_facts: false
  become: true

  roles:
    - role: pre-checks
      when: execute_pre_check | default(true)

- import_playbook: storage-backend-migration-pre-migration.yaml
  when: execute_pre_migration | default(true)

- name: Execute pull-images
  hosts: active_controller
  gather_facts: false
  become: true

  roles:
    - role: pull-images
      tags: pull-images
      when: execute_pull_images | default(true)

- name: Change drbd and ceph-storage-network scripts to always return OK
  hosts: all
  gather_facts: false
  become: true

  tasks:
    - name: Force ceph-storage-network script to always return OK
      replace:
        path: /etc/init.d/ceph-storage-network
        regexp: '^exit \$\{RETVAL\}$'
        replace: 'exit 0'
      register: ceph_script_patch

    - name: Confirm patch was applied
      debug:
        msg: "Script patched successfully"
      when: ceph_script_patch.changed

    - name: Check if drbd-cephmon guard is already applied
      ansible.builtin.command:
        cmd: grep -q "drbd-cephmon deprovision guard" /ostree/1/usr/lib/ocf/resource.d/linbit/drbd
      register: guard_check
      failed_when: false
      changed_when: false

    - name: Apply drbd-cephmon guard patch
      ansible.builtin.shell: |
        sed -i '/^case $__OCF_ACTION in$/i \
        # --- BEGIN drbd-cephmon deprovision guard ---\
        if [ "${OCF_RESKEY_drbd_resource}" = "drbd-cephmon" ]; then\
            if ! grep -qr "resource drbd-cephmon" /etc/drbd.d/ 2>/dev/null; then\
                case $__OCF_ACTION in\
                    monitor|status)\
                        ocf_log info "drbd-cephmon: resource not configured, returning NOT_RUNNING"\
                        exit 7\
                        ;;\
                    *)\
                        ocf_log info "drbd-cephmon: resource not configured, returning SUCCESS for $__OCF_ACTION"\
                        exit 0\
                        ;;\
                esac\
            fi\
        fi\
        # --- END drbd-cephmon deprovision guard ---' /ostree/1/usr/lib/ocf/resource.d/linbit/drbd
      when: guard_check.rc != 0

- name: Turn off Ceph bare-metal on Nodes (Except Active Controller)
  hosts: storages, workers, standby_controller
  serial: 1
  gather_facts: false
  become: true

  roles:
    - role: remove-unmatched-pvcs
    - role: remove-baremetal

- name: Turn off Ceph bare-metal on Active Controller
  hosts: active_controller
  gather_facts: false
  become: true

  roles:
    - role: remove-unmatched-pvcs
    - role: remove-baremetal

- name: Wipe disks on hosts with OSDs
  hosts: with_osds
  gather_facts: false
  become: true

  roles:
    - role: wipe-disks

- name: Restart sysinv
  hosts: storages, workers, standby_controller, active_controller
  serial: 1 # run fully on one host at a time
  gather_facts: false
  become: true

  pre_tasks:
    - name: Check host connection before proceed
      import_role:
        name: check_connection

  roles:
    - role: restart-sysinv

- name: Update Puppet
  hosts: active_controller
  gather_facts: false
  become: true

  roles:
    - role: update-puppet

- name: Revert drbd and ceph-storage-network scripts to original behavior
  hosts: storages, workers, standby_controller, active_controller
  gather_facts: false
  become: true

  tasks:
    - name: Check if drbd-cephmon guard is present
      ansible.builtin.command:
        cmd: grep -q "drbd-cephmon deprovision guard" /ostree/1/usr/lib/ocf/resource.d/linbit/drbd
      register: guard_check
      failed_when: false
      changed_when: false

    - name: Remove drbd-cephmon guard patch
      ansible.builtin.shell: |
        sed -i '/^# --- BEGIN drbd-cephmon deprovision guard ---$/,/^# --- END drbd-cephmon deprovision guard ---$/d' /ostree/1/usr/lib/ocf/resource.d/linbit/drbd
      when: guard_check.rc == 0

    - name: Restore original exit code in ceph-storage-network script
      replace:
        path: /etc/init.d/ceph-storage-network
        regexp: '^exit 0$'
        replace: 'exit ${RETVAL}'
      register: ceph_script_revert

    - name: Confirm revert was applied
      debug:
        msg: "Script reverted successfully"
      when: ceph_script_revert.changed

- name: Reinstall Storage nodes as Workers
  hosts: active_controller
  gather_facts: false
  become: true

  roles:
    - role: reinstall-storage-nodes
      when: system.system_deployment == "STORAGE"

- name: Deploy Rook-Ceph app
  hosts: storages, workers, standby_controller, active_controller
  gather_facts: false
  become: true

  roles:
    - role: deploy-rook
      vars:
        hosts_to_add_mon: "{{ groups.with_monitor }}"
        hosts_to_fix_capabilities: "{{ groups.with_mon_and_osds }}"
        add_floating: true

- name: Check Rook-Ceph deploy
  hosts: active_controller
  gather_facts: false
  become: true

  roles:
    - role: deploy-rook-post-checks
    - role: add-rook-missing-resources
    - role: recreate-pvcs
      when: migration_type == "redeploy"

- import_playbook: storage-backend-migration-post-migration.yaml
  when: execute_post_migration | default(true)
