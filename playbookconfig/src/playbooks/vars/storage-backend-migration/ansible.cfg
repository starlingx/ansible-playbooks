[defaults]
inventory = ../../host_vars/storage-backend-migration/inventory
roles_path = ../../roles/storage-backend-migration
fact_caching = jsonfile
fact_caching_connection = ~/.storage-backend-migration-ansible-cache
fact_caching_timeout = 0
host_key_checking = False
callbacks_enabled = profile_tasks, timer
callback_whitelist = profile_tasks # bullseye (ansible 2.10) equivalent of callbacks_enabled
forks = 1
any_errors_fatal = true
log_path = ~/storage-backend-migration-ansible.log
timeout = 60
# YAML output requires ansible-core 2.13+;
# bullseye (ansible 2.10) falls back to JSON
stdout_callback = default
callback_result_format = yaml

[ssh_connection]
pipelining = True
scp_if_ssh = True
