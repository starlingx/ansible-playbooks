- name: Get hosts that are not unlocked/enabled/available
  become: true
  become_user: postgres
  command: |
    psql -d sysinv -t -A -c
    "SELECT hostname || '|' || administrative || '|' || operational || '|' || availability
    FROM i_host
    WHERE administrative != 'unlocked' OR operational != 'enabled' OR availability != 'available';"
  register: bad_host_list
  changed_when: false

- name: List hosts not ready for migration
  debug:
    msg: |
      Hosts not ready for migration:
      {{ bad_host_list.stdout_lines | trim | replace('\\n', '\n') }}
  when: bad_host_list.stdout_lines | length > 0

- name: Fail if any host is not ready
  fail:
    msg: |
      The following hosts are not ready for migration (expected: unlocked/enabled/available):
      {{ bad_host_list.stdout_lines | trim | replace('\\n', '\n') }}
  when: bad_host_list.stdout_lines | length > 0

- name: Debug confirmation when all hosts are ready
  debug:
    msg: "All hosts are unlocked, enabled, and available. Ready for migration."
  when: bad_host_list.stdout_lines | length == 0