- name: Check for applications currently applying
  become: true
  become_user: postgres
  command: psql -d sysinv -t -A -c "SELECT name FROM kube_app WHERE status='applying';"
  changed_when: false
  register: apps_applying_check

- name: Debug applications in applying state
  debug:
    var: apps_applying_check.stdout_lines
  when: apps_applying_check.stdout_lines | length > 0

- name: Fail if any applications are still applying
  fail:
    msg: >-
      One or more applications are currently being applied.
      Please wait until all applications are in "applied" or "uploaded" state.
      Output:
      {{ apps_applying_check.stdout_lines }}
  when: apps_applying_check.stdout_lines | length > 0
