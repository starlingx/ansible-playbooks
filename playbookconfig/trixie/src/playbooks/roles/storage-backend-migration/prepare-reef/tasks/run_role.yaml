- name: "Ensure {{ tmp_workspace }} exist"
  file:
    path: "{{ tmp_workspace }}"
    state: directory

- name: "Uninstall Ceph Pacific"
  include_tasks: uninstall_pacific.yaml

- name: Create rook-ceph-mon secret if does not exists
  include_tasks: "{{ roles_dir_path }}/nautilus-to-pacific/tasks/create_mon_secret.yaml"

- name: Cleanup temporary rook-ceph folder
  file:
    path: "{{ tmp_workspace }}"
    state: absent
