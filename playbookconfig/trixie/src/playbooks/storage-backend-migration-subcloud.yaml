#
# This playbook is intended to be run on system controller.
#
# It provides the capability to migrate the storage backend used.
#
# To run the playbook, the user would define the required variable settings
# passing this on the ansible command-line as a parameter.
#
# Parameters are:
#
# - target_list
# - migration_type: redeploy, export-import or in-service
#
# To run the playbook, the user would define an overrides file that
# provides the required variable settings, passing this on the ansible
# command-line as a parameter.
# (see storage-backend-migration-inventory-EXAMPLE.yaml)
#
#
# Example command:
# ansible-playbook /usr/share/ansible/stx-ansible/playbooks/storage-backend-migration-subcloud.yaml -v \
#     -i my_inventory.yaml \
#     --extra-vars "target_list=subcloud1 migration_type=redeploy"
#
# Use target_list to target individual subclouds, or a comma-separated
# list of subclouds such as 'subcloud1,subcloud2'. To target all online
# subclouds at once use target_list=all_online_subclouds
#
#
# Optional extra variables:
#
# - osd_usage_safety_margin_percent: 0 <= int <= 100.
# - cgts_vg_min_required_free_gib: 1 <= int <= 100
# - minimum_platform_mem_workers: 1000 <= int <= 100000
# - storage_backend_migration_backup_dir: string
# - backups_path: <path/to/backups> (for export-import migration type or in-service if using kube-rbdkube-system pool)
# - erase_rbd_snapshots: bool
#

- hosts: localhost
  gather_facts: no
  vars:
    valid_migration_types:
      - redeploy
      - export-import
      - in-service
  vars_files:
    - vars/common/main.yml
  tasks:
    - name: Fail if target_list is not defined
      fail:
        msg: >-
          Please provide the target list in extra-vars.
          Example --extra-vars "target_list=subcloud1,subcloud2"
          or "target_list=all_online_subclouds" to target all online subclouds
          in 'dcmanager subcloud list'
      when: target_list is undefined

    - name: Ensure migration_type is defined and valid
      assert:
        that:
          - migration_type is defined
          - migration_type in valid_migration_types
        fail_msg: >-
          Invalid or missing migration_type.
          Must be one of: {{ valid_migration_types | join(', ') }}.
          Current value: {{ migration_type | default('undefined') }}
        success_msg: "Migration type validated: {{ migration_type }}"

    - name: Validate optional parameters
      assert:
        that:
          - osd_usage_safety_margin_percent | int >= 0 and osd_usage_safety_margin_percent | int <= 100
        fail_msg: "osd_usage_safety_margin_percent must be between 0 and 100, got: {{ osd_usage_safety_margin_percent }}"
      when: osd_usage_safety_margin_percent is defined

    - name: Validate cgts_vg_min_required_free_gib
      assert:
        that:
          - cgts_vg_min_required_free_gib | int >= 1 and cgts_vg_min_required_free_gib | int <= 100
        fail_msg: "cgts_vg_min_required_free_gib must be between 1 and 100, got: {{ cgts_vg_min_required_free_gib }}"
      when: cgts_vg_min_required_free_gib is defined

    - name: Validate minimum_platform_mem_workers
      assert:
        that:
          - minimum_platform_mem_workers | int >= 1000 and minimum_platform_mem_workers | int <= 100000
        fail_msg: "minimum_platform_mem_workers must be between 1000 and 100000, got: {{ minimum_platform_mem_workers }}"
      when: minimum_platform_mem_workers is defined

    - name: Validate storage_backend_migration_backup_dir
      assert:
        that:
          - storage_backend_migration_backup_dir | length > 0
        fail_msg: "storage_backend_migration_backup_dir must be a non-empty string"
      when: storage_backend_migration_backup_dir is defined

    - name: Validate backups_path
      assert:
        that:
          - backups_path | length > 0
        fail_msg: "backups_path must be a non-empty string"
      when: backups_path is defined

    - name: Validate erase_rbd_snapshots
      assert:
        that:
          - erase_rbd_snapshots == "true" or erase_rbd_snapshots == "false"
        fail_msg: "erase_rbd_snapshots must be a bool"
      when: erase_rbd_snapshots is defined

    - name: Get all online subclouds in the system
      block:
        - name: Get online subclouds from dcmanager
          shell: |
            source /etc/platform/openrc
            dcmanager subcloud list -c name -c availability | awk ' $4 == "online" { print $2 }'
          register: subclouds

        - name: Add host to target_group
          add_host:
            name: "{{ item }}"
            groups: target_group
          with_items: "{{ subclouds.stdout_lines }}"

      when: "'all_online_subclouds' in target_list"

    - name: Get subcloud from extra-vars
      add_host:
        name: "{{ item }}"
        groups: target_group
      with_items: "{{ target_list.split(',') }}"
      when: "item != 'all_online_subclouds'"

- hosts: target_group
  gather_facts: no

  roles:
    - common/check-connectivity

  tasks:
    - name: Build extra vars for inner playbook
      set_fact:
        extra_vars_arg: >
          {%- set vars_list = [] -%}
          {%- if backups_path is defined -%}
            {%- set _ = vars_list.append('backups_path=' + backups_path) -%}
          {%- endif -%}
          {%- if osd_usage_safety_margin_percent is defined -%}
            {%- set _ = vars_list.append('osd_usage_safety_margin_percent=' + osd_usage_safety_margin_percent | string) -%}
          {%- endif -%}
          {%- if cgts_vg_min_required_free_gib is defined -%}
            {%- set _ = vars_list.append('cgts_vg_min_required_free_gib=' + cgts_vg_min_required_free_gib | string) -%}
          {%- endif -%}
          {%- if minimum_platform_mem_workers is defined -%}
            {%- set _ = vars_list.append('minimum_platform_mem_workers=' + minimum_platform_mem_workers | string) -%}
          {%- endif -%}
          {%- if storage_backend_migration_backup_dir is defined -%}
            {%- set _ = vars_list.append('storage_backend_migration_backup_dir=' + storage_backend_migration_backup_dir) -%}
          {%- endif -%}
          {%- if backups_path is defined -%}
            {%- set _ = vars_list.append('backups_path=' + backups_path) -%}
          {%- endif -%}
          {%- if erase_rbd_snapshots is defined -%}
            {%- set _ = vars_list.append('erase_rbd_snapshots=' + erase_rbd_snapshots) -%}
          {%- endif -%}
          {{ '--extra-vars "' ~ (vars_list | join(' ')) ~ '"'
            if vars_list | length > 0 else '' }}

    - name: Display extra-vars argument
      debug:
        var: extra_vars_arg

    - name: "Run migration playbook on subcloud"
      command: >
        ansible-playbook
        /usr/share/ansible/stx-ansible/playbooks/storage-backend-migration-{{ migration_type }}.yaml -v
        {{ extra_vars_arg }}
      environment:
        ANSIBLE_CONFIG: "/usr/share/ansible/stx-ansible/playbooks/vars/storage-backend-migration/ansible.cfg"

