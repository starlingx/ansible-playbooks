- name: "Ensure {{ tmp_workspace }} exist"
  file:
    path: "{{ tmp_workspace }}"
    state: directory

- name: Copy files to workspace
  copy:
    src: "{{ roles_dir_path }}/{{ role_name }}/files/{{ item }}"
    dest: "{{ tmp_workspace }}/{{ item }}"
    mode: "0755"
  loop: "{{ script_files }}"

- name: Generate system DM file
  include_tasks: get_system_dm_file.yaml

- name: Fix storage backend network
  include_tasks: change_dm_file.yaml
  vars:
    target_dm_file_name: "network-fixed.yaml"
    dm_script_name: "fix_rook_backend_network.py"

- name: Remove incomplete secrets in DM file
  include_tasks: change_dm_file.yaml
  vars:
    target_dm_file_name: "secrets-fixed.yaml"
    dm_script_name: "remove_incomplete_secrets.py"

- name: Backup final DM file
  include_tasks: backup_dm_file.yaml

- name: Cleanup temporary workspace folder
  file:
    path: "{{ tmp_workspace }}"
    state: absent
