- name: Get OSDs information from ceph
  shell: "ceph osd tree -f json | python3 -c '{{ lookup('file', 'get_osd_info.py') }}'"
  register: ceph_osds_info
  changed_when: false

- name: Build OSD info lookup table
  set_fact:
    ceph_osd_lookup: "{{ ceph_osd_lookup | default({}) | combine({ item_json.osd_id: item_json }) }}"
  loop: "{{ ceph_osds_info.stdout_lines }}"
  loop_control:
    extended: true
  vars:
    item_json: "{{ item | from_json }}"
  when: ceph_osds_info.stdout_lines is defined

- name: Get list of OSD IDs from database lookup
  set_fact:
    all_osd_ids: "{{ disks_by_host_db.values() | flatten | map(attribute='osd_id') | list }}"

- name: Build OSD info lookup table with metadata
  shell: "ceph osd metadata {{ item }} -f json"
  delegate_to: "{{ host_with_mon_and_osd }}"
  register: osd_metadata_results
  changed_when: false
  loop: "{{ all_osd_ids }}"

- name: Integrate OSD metadata (including objectstore type) into a lookup table
  set_fact:
    ceph_osd_lookup: >-
      {{
        ceph_osd_lookup | default({}) | combine({
          item_json.id: (ceph_osd_lookup[item_json.id] | default({})) | combine({
            'osd_objectstore': item_json.osd_objectstore
          })
        })
      }}
  loop: "{{ osd_metadata_results.results }}"
  loop_control:
    extended: true
    label: "{{ item_json.id }}"
  vars:
    item_json: "{{ item.stdout | from_json }}"
  when: item.rc == 0 and item.stdout | length > 0

- name: Integrate Ceph OSD data into disks_by_host
  vars:
    disks_by_host_template: |
      {% set new_disks_by_host = {} %}
      {% for hostname, disks in disks_by_host_db.items() %}
        {% set new_disk_list = [] %}
        {% for disk in disks %}
          {% set osd_id = disk.osd_id %}
          {% set ceph_data = ceph_osd_lookup.get(osd_id, {}) %}

          {% set _ = disk.update(ceph_data) %}

          {% set _ = new_disk_list.append(disk) %}
        {% endfor %}
        {% set _ = new_disks_by_host.update({hostname: new_disk_list}) %}
      {% endfor %}
      {{ new_disks_by_host | to_json }}
  set_fact:
    disks_by_host: "{{ disks_by_host_template | from_json }}"
    cacheable: true
  when: ceph_osd_lookup is defined